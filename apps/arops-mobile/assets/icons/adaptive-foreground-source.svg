<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Android adaptive-icon foreground: same tower artwork as icon-source.svg,
       minus the background rects (the adaptive background layer supplies
       the dark fill instead — see android.adaptiveIcon.backgroundColor in
       app.config.js), scaled down and centered so it survives the OS's
       circle/squircle/rounded-square icon mask crop (the "safe zone" is
       roughly the center 66% of the canvas). -->
  <g transform="translate(32,32) scale(0.62) translate(-32,-32)">
    <rect x="24" y="16" width="16" height="32" rx="2" fill="#8a6030"/>
    <rect x="22" y="14" width="20" height="8" rx="2" fill="#a07040"/>
    <rect x="22" y="12" width="5" height="5" rx="1" fill="#c09060"/>
    <rect x="29" y="12" width="6" height="5" rx="1" fill="#c09060"/>
    <rect x="37" y="12" width="5" height="5" rx="1" fill="#c09060"/>
    <rect x="30" y="26" width="4" height="10" rx="1" fill="#1a1206"/>
    <rect x="24" y="44" width="16" height="3" rx="1" fill="#f0c040"/>
    <circle cx="16" cy="16" r="3" fill="#f0c040" opacity=".8"/>
    <circle cx="48" cy="48" r="2.5" fill="#f0c040" opacity=".6"/>
    <circle cx="48" cy="16" r="2" fill="#f0c040" opacity=".5"/>
  </g>
</svg>
