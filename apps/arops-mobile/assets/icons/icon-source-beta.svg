<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <rect width="64" height="64" rx="12" fill="#1a1206"/>
  <rect x="4" y="4" width="56" height="56" rx="9" fill="#2a1e0a"/>
  <!-- Tower -->
  <rect x="24" y="16" width="16" height="32" rx="2" fill="#8a6030"/>
  <rect x="22" y="14" width="20" height="8" rx="2" fill="#a07040"/>
  <!-- Battlements -->
  <rect x="22" y="12" width="5" height="5" rx="1" fill="#c09060"/>
  <rect x="29" y="12" width="6" height="5" rx="1" fill="#c09060"/>
  <rect x="37" y="12" width="5" height="5" rx="1" fill="#c09060"/>
  <!-- Arrow slit -->
  <rect x="30" y="26" width="4" height="10" rx="1" fill="#1a1206"/>
  <!-- Gold trim -->
  <rect x="24" y="44" width="16" height="3" rx="1" fill="#f0c040"/>
  <!-- Stars -->
  <circle cx="16" cy="16" r="3" fill="#f0c040" opacity=".8"/>
  <circle cx="48" cy="48" r="2.5" fill="#f0c040" opacity=".6"/>
  <circle cx="48" cy="16" r="2" fill="#f0c040" opacity=".5"/>
  <!-- BETA ribbon — test-channel marker, distinguishes it in the app
       drawer from the production build sharing the same base artwork. -->
  <g transform="rotate(-28 32 50)">
    <rect x="-8" y="45" width="80" height="12" fill="#d81b3a"/>
    <text x="32" y="53.8" text-anchor="middle" font-family="Arial, sans-serif" font-size="8.5" font-weight="900" fill="#ffffff" letter-spacing="0.5">BETA</text>
  </g>
</svg>
