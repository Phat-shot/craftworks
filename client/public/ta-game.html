<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<title>⏱ Time Attack</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&display=swap" rel="stylesheet">
<style>
:root{--gold:#f0c840;--bg:#06040c;--wood:#a06020;--red:#e03020}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;touch-action:none;user-select:none;font-family:'Cinzel',serif;background:var(--bg);color:#e0c870;display:flex;flex-direction:column}
#topbar{background:linear-gradient(180deg,#1c1004,#0c0800);border-bottom:2px solid #4a3008;padding:6px 10px;display:flex;align-items:center;gap:8px;flex-shrink:0}
.res{display:flex;align-items:center;gap:3px;font-size:13px;font-weight:700}
.res .lbl{font-size:7px;color:#503820}
.v-gold{color:var(--gold)}.v-wood{color:var(--wood)}
.phase-badge{margin-left:auto;font-size:10px;padding:3px 10px;border-radius:10px;font-weight:700}
.phase-placing{background:rgba(60,140,60,.3);color:#80e060;border:1px solid #3a8020}
.phase-racing{background:rgba(200,80,20,.3);color:#ff8040;border:1px solid #a03010;animation:pulse .8s ease-in-out infinite}
.phase-results{background:rgba(60,60,200,.3);color:#8080ff;border:1px solid #3030a0}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.6}}
#round-info{font-size:10px;color:#806040;white-space:nowrap}
#canvaswrap{flex:1;overflow:hidden;position:relative;background:#1a2a10;touch-action:none}
canvas{display:block;position:absolute;top:50%;left:50%;transform:translate(-50%,-50%)}
#botbar{flex-shrink:0;background:linear-gradient(180deg,#0c0800,#060400);border-top:2px solid #4a3008;padding-bottom:env(safe-area-inset-bottom,0)}
#resource-row{display:flex;gap:0;height:44px;border-bottom:1px solid #1a1004}
.res-cell{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;border-right:1px solid #1a1004;font-size:9px;gap:1px}
.res-cell:last-child{border-right:none}
.res-val{font-size:15px;font-weight:900}
.res-val.gold{color:var(--gold)}.res-val.wood{color:var(--wood)}.res-val.time{color:#80c0ff}
#build-row{display:flex;height:58px}
.bld-btn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;background:none;border:none;border-right:1px solid #1a1004;cursor:pointer;font-family:'Cinzel',serif;color:#806830;padding:4px;position:relative;transition:background .1s}
.bld-btn:last-child{border-right:none}
.bld-btn.sel{background:rgba(240,200,60,.12);color:var(--gold)}
.bld-btn:active{background:rgba(255,200,60,.08)}
.bld-btn .bld-nm{font-size:8px;font-weight:700}
.bld-btn .bld-co{font-size:7px;color:#705828}
#action-row{display:flex;height:44px}
#btn-ready{flex:1;background:linear-gradient(180deg,#0e2e0e,#061806);border:none;border-right:1px solid #1a1004;color:#60d040;font-family:'Cinzel',serif;font-size:13px;font-weight:700;cursor:pointer}
#btn-ready:disabled{opacity:.4;cursor:not-allowed}
#btn-ready.racing{background:linear-gradient(180deg,#2e1a06,#180e02);color:#ff8040}
#btn-clear{width:70px;background:#100e04;border:none;color:#806030;font-family:'Cinzel',serif;font-size:10px;cursor:pointer}
#btn-quit{width:44px;background:#1a0a04;border:none;color:#804030;font-size:18px;cursor:pointer}
/* Overlays */
#results-overlay{display:none;position:absolute;inset:0;background:rgba(2,1,0,.9);backdrop-filter:blur(6px);align-items:center;justify-content:center;flex-direction:column;gap:14px;z-index:200;text-align:center}
#results-overlay.on{display:flex}
#res-title{font-size:24px;font-weight:900;color:var(--gold)}
#res-table{font-size:13px;line-height:2}
.toast{position:absolute;top:8px;left:50%;transform:translateX(-50%);font-size:11px;padding:7px 16px;border-radius:20px;pointer-events:none;display:none;z-index:300;white-space:nowrap;text-align:center}
.toast.on{display:block;animation:fadeout 2.5s forwards}
@keyframes fadeout{0%,60%{opacity:1}100%{opacity:0}}
</style>
</head>
<body>
<div id="topbar">
  <div id="round-info" style="font-family:Cinzel,serif;font-size:11px;color:var(--gold)">Runde <span id="v-round">1</span>/<span id="v-total">5</span></div>
  <span class="phase-badge phase-placing" id="phase-badge">PLATZIEREN</span>
</div>

<div id="canvaswrap">
  <canvas id="gc"></canvas>
  <div class="toast" id="toast"></div>
  <div id="results-overlay">
    <div id="res-title">Runde beendet!</div>
    <div id="res-table"></div>
    <div id="res-next" style="font-size:11px;color:#604828"></div>
  </div>
</div>

<div id="botbar">
  <div id="resource-row">
    <div class="res-cell">
      <div class="res-val gold" id="r-gold">100</div>
      <div style="color:#504020;font-size:7px">💰 MAUERN</div>
    </div>
    <div class="res-cell">
      <div class="res-val wood" id="r-wood">50</div>
      <div style="color:#504020;font-size:7px">🪵 EFFEKTE</div>
    </div>
    <div class="res-cell">
      <div class="res-val time" id="r-time">–</div>
      <div style="color:#504020;font-size:7px">LETZTE ZEIT</div>
    </div>
    <div class="res-cell">
      <div class="res-val" style="color:#c0a040" id="r-score">0</div>
      <div style="color:#504020;font-size:7px">PUNKTE</div>
    </div>
  </div>
  <div id="build-row">
    <button class="bld-btn sel" id="btn-wall_block" onclick="selectTool('wall_block')">
      🧱<div class="bld-nm">Mauer</div><div class="bld-co">1💰</div>
    </button>
    <button class="bld-btn" id="btn-effect" onclick="selectTool('effect')">
      🌿<div class="bld-nm" id="effect-nm">Effekt</div><div class="bld-co">1🪵</div>
    </button>
    <button class="bld-btn" id="btn-remove" onclick="selectTool('remove')">
      🗑️<div class="bld-nm">Entfernen</div><div class="bld-co">—</div>
    </button>
  </div>
  <div id="action-row">
    <button id="btn-ready" onclick="sendReady()">✓ Fertig — Rennen starten</button>
    <button id="btn-clear" onclick="clearAll()">🗑 Alle</button>
    <button id="btn-quit"  onclick="quitGame()">🚪</button>
  </div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script src="/game-common.js"></script>
<script src="/game-brand.js"></script>
<script>
'use strict';
// ── State ──────────────────────────────────────────────
let COLS=35, ROWS=50, TILE=32, CW, CH;
// Initialize grid dimensions from session immediately (before first tick)
(function initGridDims(){
  try {
    const s=JSON.parse(sessionStorage.getItem('mp_session')||'null');
    const tl=s?.workshopConfig?.ta_layout;
    if(tl?.cols) COLS=tl.cols;
    if(tl?.rows) ROWS=tl.rows;
  } catch(e){}
})();
let GS = { phase:'placing', round:1, totalRounds:5, players:{}, myTowers:[], myPath:[], myMinion:null, entryCol:Math.floor(COLS/2) };
// Clear stale GS from previous session immediately
function resetGS(){ GS={ phase:'placing', round:1, totalRounds:5, players:{}, myTowers:[], myPath:[], myMinion:null, entryCol:7 }; _lmx=null; _lmy=null; _ddir=4; Object.keys(_taSprites||{}).forEach(k=>delete _taSprites[k]); }
// Clear stale display values on load
window.addEventListener('load', () => {
  document.getElementById('r-time').textContent='–';
  document.getElementById('r-score').textContent='0';
});
let myUserId=null, sessionId=null, socket=null;
let selectedTool='wall_block';
let _effectBlockId='slow_block'; // race-specific, set from snap
let hoverCell=null;
let myGold=100, myWood=50, myScore=0, myLastTime=null;
let raceStartTime=null;
let timerInterval=null;

const canvas=document.getElementById('gc');
const ctx=canvas.getContext('2d');
const SRV=32; // server tile size

// ── Layout ─────────────────────────────────────────────
function applyLayout(){
  const wrap=document.getElementById('canvaswrap');
  const dpr=window.devicePixelRatio||1;
  const aw=wrap.clientWidth||320, ah=wrap.clientHeight||480;
  const byW=Math.floor(aw/COLS), byH=Math.floor(ah/ROWS);
  TILE=Math.max(14,Math.min(byW,byH));
  CW=TILE*COLS; CH=TILE*ROWS;
  canvas.width=CW*dpr; canvas.height=CH*dpr;
  canvas.style.width=CW+'px'; canvas.style.height=CH+'px';
  ctx.setTransform(dpr,0,0,dpr,0,0);
}

function sc(v){return v*(TILE/SRV);}

// ── Socket ──────────────────────────────────────────────
function connect(){
  const sess=JSON.parse(sessionStorage.getItem('mp_session')||'null');
  if(!sess)return;
  myUserId=sess.userId; sessionId=sess.sessionId;
  const token=localStorage.getItem('access_token');
  socket=io({auth:{token}});

  let _gameStarted=false;
  socket.on('disconnect', (reason) => {
    if (reason === 'io server disconnect' || reason === 'transport close') {
      // Try auto-reconnect once
      setTimeout(() => { if(socket && !socket.connected) socket.connect(); }, 2000);
    }
  });
  socket.on('connect_error', (e) => {
    console.warn('TA connect error:', e.message);
  });
  socket.on('connect',()=>{
    const s=JSON.parse(sessionStorage.getItem('mp_session')||'null');
    if(s&&s.solo){
      if(_gameStarted){
        if(sessionId) socket.emit('game:join',{sessionId});
        return;
      }
      _gameStarted=true;
      const wc=s.workshopConfig?JSON.parse(JSON.stringify(s.workshopConfig)):null;
      socket.emit('game:solo_start',{
        difficulty:s.difficulty||'normal',
        race:s.race||'standard',
        workshopConfig:wc,
        mode:s.mode||'solo',
      });
    } else {
      socket.emit('game:join',{sessionId});
    }
  });

  socket.on('game:solo_started',({sessionId:sid,mode:m})=>{
    sessionId=sid;
    const sess=JSON.parse(sessionStorage.getItem('mp_session')||'{}')||{};
    sess.sessionId=sid;
    sessionStorage.setItem('mp_session',JSON.stringify(sess));
    if(sess.workshopConfig&&window.applyBrandConfig) applyBrandConfig(sess.workshopConfig);
    // Redirect if wrong game page
    if(m==='td'||m==='solo'||m==='coop'){window.location.href='/td-game.html';return;}
    if(m==='vs'&&!window.location.href.includes('vs-game')){window.location.href='/vs-game.html';return;}
    if(m==='time_attack'&&!window.location.href.includes('ta-game')){window.location.href='/ta-game.html';return;}
    // Correct page — just hide any loading screen
  });

  socket.on('game:ta_tick',(snap)=>{
    // Update effect block from snap (race-specific)
    if(snap.availableTaBlocks){
      const eff=snap.availableTaBlocks.find(b=>b.id!=='wall_block');
      if(eff) setEffectBlock(eff);
    }
    // Update grid dimensions from server (TA grid can vary)
    // Apply snap, preserving computed grid dims
    const prevPhase=GS.phase;
    GS=snap;
    // Update grid dimensions if changed
    if(snap.cols && snap.cols !== COLS){ COLS=snap.cols; applyLayout(); }
    if(snap.rows && snap.rows !== ROWS){ ROWS=snap.rows; applyLayout(); }
    // Phase transition: clear sprite cache so prebuilt badges update
    if(prevPhase!==snap.phase && snap.phase==='placing'){
      Object.keys(_taSprites).forEach(k=>delete _taSprites[k]);
    }
    const me=snap.players?.[myUserId];
    if(me){
      myGold=me.gold??myGold;
      myWood=me.wood??myWood;
      myScore=me.score??0;
      myLastTime=me.lastTime??null;
    }
    updateHUD();
    // Show ready count in multiplayer
    const players=Object.values(snap.players||{});
    const readyCount=players.filter(p=>p.ready).length;
    const bw=document.getElementById('btn-ready');
    if(bw&&!bw.disabled&&players.length>1&&snap.phase==='placing'){
      const sess=JSON.parse(sessionStorage.getItem('mp_session')||'null');
      if(sess&&!sess.solo) bw.textContent=`✓ Fertig (${readyCount}/${players.length} bereit)`;
    }
  });

  socket.on('game:ta_round_end',({round,players})=>{
    showResults(round,players);
  });

  socket.on('game:over',({win,rankings})=>{
    showFinalResults(rankings);
  });

  socket.on('game:action_result',({action,ok,err})=>{
    if(!ok){
      const msgs={'no_resources':'Nicht genug Ressourcen!','blocks_path':'⚠️ Würde Weg blockieren!',
                  'no_session':'Verbindung verloren - bitte neu laden','not_placing':'Warte auf Runden-Start',
                  'unknown_type':'Unbekannter Block-Typ'};
      toast(msgs[err]||err||'Fehler');
    }
  });
}

// ── HUD ──────────────────────────────────────────────────
function updateHUD(){
  document.getElementById('v-round').textContent=(GS.round||0)+1;
  document.getElementById('v-total').textContent=GS.totalRounds||5;
  document.getElementById('r-gold').textContent=myGold;
  document.getElementById('r-wood').textContent=myWood;
  document.getElementById('r-score').textContent=myScore;
  document.getElementById('r-time').textContent=(myLastTime&&myLastTime>0)?formatTime(myLastTime):'–';
  const badge=document.getElementById('phase-badge');
  const cd=GS.countdown;
  badge.className='phase-badge phase-'+GS.phase;
  badge.textContent=GS.phase==='placing'?
    (cd!=null?`PLATZIEREN ${cd}s`:'PLATZIEREN'):
    GS.phase==='racing'?'⚡ RENNEN':'ERGEBNIS';
  const bready=document.getElementById('btn-ready');
  bready.disabled=GS.phase!=='placing';
  bready.className=GS.phase==='racing'?'racing':'';
  if(GS.phase==='placing') bready.textContent='✓ Fertig — Rennen starten';
  else if(GS.phase==='racing') bready.textContent='⚡ Rennen läuft…';
}

function formatTime(ms){ return (ms/1000).toFixed(2)+'s'; }

// ── Rendering ─────────────────────────────────────────────
function render(){
  ctx.clearRect(0,0,CW,CH);
  drawGrid();
  drawTowers();
  drawPath();
  drawHover();
  drawMinion();
}

// Tile color palettes
const GRASS_COLORS=['#2d5018','#355e1c','#264814','#3a6820'];
const PATH_COLORS =['#1e3a0e','#233e10','#1a3008'];

function drawGrid(){
  const pathSet=new Set((GS.myPath||[]).map(([r,c])=>`${r},${c}`));
  for(let r=0;r<ROWS;r++) for(let c=0;c<COLS;c++){
    const isPath=pathSet.has(`${r},${c}`);
    ctx.fillStyle=isPath?PATH_COLORS[(r+c)%3]:GRASS_COLORS[(r*3+c)%4];
    ctx.fillRect(c*TILE,r*TILE,TILE,TILE);
  }
  // Grid lines
  ctx.strokeStyle='rgba(0,0,0,.07)'; ctx.lineWidth=.5;
  for(let r=0;r<=ROWS;r++){ctx.beginPath();ctx.moveTo(0,r*TILE);ctx.lineTo(CW,r*TILE);ctx.stroke();}
  for(let c=0;c<=COLS;c++){ctx.beginPath();ctx.moveTo(c*TILE,0);ctx.lineTo(c*TILE,CH);ctx.stroke();}
  // Entry/Exit
  const entry = GS.entryCol !== undefined ? GS.entryCol : Math.floor(COLS/2);
  drawPortal(entry*TILE+TILE/2, TILE/2, '#50ff70', '▼', 'START');
  drawPortal(entry*TILE+TILE/2, (ROWS-1)*TILE+TILE/2, '#ff6050', '▲', 'ZIEL');
}

function drawPortal(x,y,col,arrow,label){
  const g=ctx.createRadialGradient(x,y,1,x,y,TILE*.75);
  g.addColorStop(0,col+'aa'); g.addColorStop(1,'transparent');
  ctx.fillStyle=g; ctx.beginPath(); ctx.arc(x,y,TILE*.75,0,Math.PI*2); ctx.fill();
  ctx.fillStyle=col; ctx.font=`bold ${TILE*.4}px serif`;
  ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.shadowColor=col; ctx.shadowBlur=10; ctx.fillText(arrow,x,y); ctx.shadowBlur=0;
  ctx.font=`bold ${TILE*.22}px Cinzel,serif`; ctx.fillStyle=col+'cc';
  ctx.fillText(label,x,y+TILE*.5);
}

// ──────────────────────────────────────────────────────────────
//  TA BLOCK SPRITES  (all 2×2 tiles, canvas-drawn 3D)
// ──────────────────────────────────────────────────────────────
const _taSprites={};
function _getTaSprite(type,prebuilt,sz){
  const k=`${type}_${prebuilt?1:0}_${sz}`;
  if(_taSprites[k]) return _taSprites[k];
  const oc=document.createElement('canvas'); oc.width=sz; oc.height=sz;
  const x=oc.getContext('2d');
  _drawTaSprite(x,type,prebuilt,sz);
  _taSprites[k]=oc; return oc;
}

function _drawTaSprite(x,type,pb,sz){
  const c=sz/2, pad=sz*.04;
  // ── Wall Block ──────────────────────────────────────
  if(type==='wall_block'||type==='wall'){
    // Stone base with depth
    const g=x.createLinearGradient(0,0,sz,sz);
    g.addColorStop(0,'#8a7060'); g.addColorStop(.3,'#6a5040'); g.addColorStop(1,'#3a2818');
    x.fillStyle=g; x.fillRect(0,0,sz,sz);
    // Brickwork
    const bH=sz*.22, bW=sz*.48;
    const rows2=Math.ceil(sz/bH);
    for(let r=0;r<rows2;r++){
      const y0=r*bH, offset=(r%2)*bW*.5;
      const bricksPerRow=Math.ceil((sz+bW)/bW)+1;
      for(let c2=0;c2<bricksPerRow;c2++){
        const x0=c2*bW-offset-bW*.05;
        // Brick face
        const bg2=x.createLinearGradient(x0,y0,x0+bW*.9,y0+bH*.9);
        bg2.addColorStop(0,'#907060'); bg2.addColorStop(.5,'#7a5e48'); bg2.addColorStop(1,'#5a4030');
        x.fillStyle=bg2; x.fillRect(x0+1,y0+1,bW*.9-1,bH*.9-1);
        // Top highlight
        x.fillStyle='rgba(255,220,160,.18)'; x.fillRect(x0+1,y0+1,bW*.9-1,bH*.12);
        // Mortar lines (dark gaps)
        x.fillStyle='rgba(0,0,0,.5)';
        x.fillRect(x0,y0,1,bH); x.fillRect(x0,y0,bW*.9,1);
      }
    }
    // Overall depth shading
    x.fillStyle='rgba(0,0,0,.22)'; x.fillRect(0,sz*.82,sz,sz*.18);
    x.fillRect(sz*.82,0,sz*.18,sz);
    // Top light
    const shine=x.createLinearGradient(0,0,sz,sz*.15);
    shine.addColorStop(0,'rgba(255,220,160,.22)'); shine.addColorStop(1,'rgba(255,220,160,0)');
    x.fillStyle=shine; x.fillRect(0,0,sz,sz);
  }
  // ── Effect Blocks ───────────────────────────────────
  else {
    const defs={
      slow_block:   {bg1:'#2a4810',bg2:'#0e200a',glow:'#60c030',rimC:'rgba(80,200,40,.6)'},
      passive:      {bg1:'#2a4810',bg2:'#0e200a',glow:'#60c030',rimC:'rgba(80,200,40,.6)'},
      spike_block:  {bg1:'#502808',bg2:'#200e04',glow:'#e08020',rimC:'rgba(220,100,20,.6)'},
      mine_block:   {bg1:'#242424',bg2:'#101010',glow:'#c0c0c0',rimC:'rgba(160,160,160,.5)'},
      freeze_block: {bg1:'#0c2040',bg2:'#060c20',glow:'#40b8ff',rimC:'rgba(60,160,255,.65)'},
      root_block:   {bg1:'#183008',bg2:'#0a1804',glow:'#50a020',rimC:'rgba(70,160,30,.6)'},
    };
    const d=defs[type]||defs.slow_block;
    // Pulsing glow bg
    const bg=x.createRadialGradient(c,c,sz*.05,c,c,sz*.7);
    bg.addColorStop(0,d.bg1); bg.addColorStop(1,d.bg2);
    x.fillStyle=bg; x.fillRect(0,0,sz,sz);
    // Rim glow
    x.strokeStyle=d.rimC; x.lineWidth=sz*.06;
    x.strokeRect(sz*.05,sz*.05,sz*.9,sz*.9);
    // Subtle grid texture
    x.strokeStyle='rgba(255,255,255,.05)'; x.lineWidth=.5;
    for(let i=1;i<4;i++){
      x.beginPath();x.moveTo(i*sz*.25,0);x.lineTo(i*sz*.25,sz);x.stroke();
      x.beginPath();x.moveTo(0,i*sz*.25);x.lineTo(sz,i*sz*.25);x.stroke();
    }
    // Central glow circle
    const cg=x.createRadialGradient(c,c,0,c,c,sz*.3);
    cg.addColorStop(0,d.glow+'ff'); cg.addColorStop(.5,d.glow+'88'); cg.addColorStop(1,d.glow+'00');
    x.fillStyle=cg; x.beginPath(); x.arc(c,c,sz*.3,0,Math.PI*2); x.fill();
    // Type-specific inner detail
    x.shadowColor=d.glow; x.shadowBlur=sz*.12;
    if(type==='slow_block'||type==='passive'){
      // Swirl / slowdown symbol
      x.strokeStyle=d.glow+'cc'; x.lineWidth=sz*.04;
      x.beginPath(); x.arc(c,c,sz*.18,-Math.PI*.8,Math.PI*.9); x.stroke();
      x.beginPath(); x.arc(c,c,sz*.1,-Math.PI*.5,Math.PI*.7); x.stroke();
    } else if(type==='spike_block'){
      // Spike / stun star
      x.fillStyle=d.glow; x.strokeStyle=d.bg1; x.lineWidth=sz*.025;
      for(let i=0;i<6;i++){const a=i*Math.PI/3-Math.PI/6,r1=sz*.22,r2=sz*.1;
        const pts=[[Math.cos(a)*r1+c,Math.sin(a)*r1+c],[Math.cos(a+Math.PI/6)*r2+c,Math.sin(a+Math.PI/6)*r2+c]];
        if(i===0){x.beginPath();x.moveTo(...pts[0]);}else x.lineTo(...pts[0]);
        x.lineTo(...pts[1]);
      } x.closePath(); x.fill();
    } else if(type==='mine_block'){
      // Warning stripes + X
      x.strokeStyle=d.glow; x.lineWidth=sz*.05;
      [[0.3,0.3,0.7,0.7],[0.7,0.3,0.3,0.7]].forEach(([x1,y1,x2,y2])=>{
        x.beginPath();x.moveTo(x1*sz,y1*sz);x.lineTo(x2*sz,y2*sz);x.stroke();
      });
      x.fillStyle=d.glow+'88'; x.beginPath(); x.arc(c,c,sz*.07,0,Math.PI*2); x.fill();
    } else if(type==='freeze_block'){
      // Snowflake
      x.strokeStyle=d.glow+'ee'; x.lineWidth=sz*.04;
      for(let i=0;i<6;i++){const a=i*Math.PI/3;
        x.beginPath();x.moveTo(c,c);x.lineTo(c+Math.cos(a)*sz*.24,c+Math.sin(a)*sz*.24);x.stroke();
        x.beginPath();x.moveTo(c+Math.cos(a)*sz*.12,c+Math.sin(a)*sz*.12);
        x.lineTo(c+Math.cos(a+Math.PI/6)*sz*.08+Math.cos(a)*sz*.12,c+Math.sin(a+Math.PI/6)*sz*.08+Math.sin(a)*sz*.12);x.stroke();
      }
    } else if(type==='root_block'){
      // Vine / root tendrils
      x.strokeStyle=d.glow+'cc'; x.lineWidth=sz*.04;
      [[-.2,.1],[.2,-.15],[-.1,-.2],[.15,.2]].forEach(([dx,dy])=>{
        x.beginPath();x.moveTo(c,c);
        x.quadraticCurveTo(c+dx*sz*.5,c+dy*sz*.5,c+dx*sz,c+dy*sz);x.stroke();
      });
    }
    x.shadowBlur=0;
    // Top shine
    const sh=x.createLinearGradient(0,0,sz*.4,sz*.4);
    sh.addColorStop(0,'rgba(255,255,255,.15)'); sh.addColorStop(1,'rgba(255,255,255,0)');
    x.fillStyle=sh; x.fillRect(0,0,sz,sz);
  }

  // Prebuilt golden border + star
  if(pb){
    x.strokeStyle='rgba(255,200,40,.9)'; x.lineWidth=sz*.04;
    x.strokeRect(sz*.02,sz*.02,sz*.96,sz*.96);
    x.fillStyle='rgba(255,200,40,.95)';
    x.font=`bold ${sz*.2}px Cinzel,serif`;
    x.textAlign='right'; x.textBaseline='top';
    x.fillText('★',sz-sz*.05,sz*.03);
  }
}

function drawTaBlock(x,y,type,prebuilt){
  const sz=TILE*2;
  ctx.drawImage(_getTaSprite(type,prebuilt,sz),x,y);
}

function drawTowers(){
  for(const t of GS.myTowers||[]){
    const pb=!!(t._prebuilt||t.id?.startsWith('pt_')||t.id?.startsWith('race_'));
    drawTaBlock(t.col*TILE,t.row*TILE,t.type,pb);
  }
}
function drawPath(){
  const path=GS.myPath||[];
  if(path.length<2) return;
  ctx.strokeStyle='rgba(80,200,60,.35)'; ctx.lineWidth=TILE*.25;
  ctx.setLineDash([TILE*.3,TILE*.2]);
  ctx.beginPath();
  path.forEach(([r,c],i)=>{
    const px=c*TILE+TILE/2, py=r*TILE+TILE/2;
    i===0?ctx.moveTo(px,py):ctx.lineTo(px,py);
  });
  ctx.stroke(); ctx.setLineDash([]);
}

function drawHover(){
  if(!hoverCell||GS.phase!=='placing') return;
  const{r,c}=hoverCell;
  const occ=(GS.myTowers||[]).some(t=>(r===t.row||r===t.row+1)&&(c===t.col||c===t.col+1));
  if(selectedTool==='remove'){
    if(occ){ ctx.fillStyle='rgba(200,60,60,.25)'; ctx.fillRect(c*TILE,r*TILE,TILE*2,TILE*2); }
    return;
  }
  ctx.fillStyle=occ?'rgba(200,60,60,.2)':'rgba(60,200,60,.18)';
  ctx.fillRect(c*TILE,r*TILE,TILE*2,TILE*2);
  ctx.strokeStyle=occ?'rgba(200,60,60,.5)':'rgba(60,200,60,.5)';
  ctx.lineWidth=1.5; ctx.strokeRect(c*TILE,r*TILE,TILE*2,TILE*2);
}

let _ddir=4,_lmx=null,_lmy=null;
function _dir8(dx,dy){if(Math.abs(dx)<.1&&Math.abs(dy)<.1)return _ddir;const a=Math.atan2(dy,dx);return[6,5,4,3,2,1,0,7][Math.round((a+Math.PI)/(Math.PI*2)*8)%8];}
function drawDragon(px,py,dir,elapsed){
  const T=TILE,sz=T*1.15,t2=Date.now()*.003,hov=Math.sin(t2)*T*.06,py2=py+hov;
  const D=[[0,-1],[.7,-.7],[1,0],[.7,.7],[0,1],[-.7,.7],[-1,0],[-.7,-.7]],[fdx,fdy]=D[dir],[rdx,rdy]=D[(dir+2)%8];
  const wb=Math.sin(t2*2.8)*.4+.4;
  ctx.fillStyle=`rgba(0,0,0,${.12+hov*.004})`;ctx.beginPath();ctx.ellipse(px,py+sz*.5,sz*.36,sz*.1,0,0,Math.PI*2);ctx.fill();
  ctx.save();ctx.translate(px,py2);
  [[-1],[1]].forEach(([s])=>{
    const wx=rdx*s*sz*.7,wy=rdy*s*sz*.7,wx2=rdx*s*sz*1.35+fdx*sz*.15,wy2=rdy*s*sz*1.35+fdy*sz*.15,wt=-sz*(.28+wb*.38);
    const g=ctx.createLinearGradient(0,0,wx2,wy2+wt);g.addColorStop(0,'rgba(80,20,120,.85)');g.addColorStop(.5,'rgba(140,40,200,.55)');g.addColorStop(1,'rgba(200,120,255,.05)');
    ctx.fillStyle=g;ctx.beginPath();ctx.moveTo(0,-sz*.1);ctx.quadraticCurveTo(wx*.5,wy*.5+wt*.8,wx2,wy2+wt);ctx.quadraticCurveTo(wx*1.2,wy*1.2,wx,wy);ctx.closePath();ctx.fill();
  });
  const bw=sz*.35,bh=sz*.25;
  const bg=ctx.createRadialGradient(-bw*.2,-bh*.3,bw*.04,-bw*.1,-bh*.1,bw*.8);
  bg.addColorStop(0,'#80e060');bg.addColorStop(.35,'#408030');bg.addColorStop(.75,'#204018');bg.addColorStop(1,'#102008');
  ctx.fillStyle=bg;ctx.beginPath();ctx.ellipse(0,0,bw,bh,0,0,Math.PI*2);ctx.fill();
  const hx=fdx*sz*.38,hy=fdy*sz*.38;
  const hg=ctx.createRadialGradient(hx-fdx*sz*.04,hy,sz*.02,hx,hy,sz*.19);
  hg.addColorStop(0,'#70c050');hg.addColorStop(.5,'#408030');hg.addColorStop(1,'#102008');
  ctx.fillStyle=hg;ctx.beginPath();ctx.ellipse(hx,hy,sz*.18,sz*.13,Math.atan2(fdy,fdx),0,Math.PI*2);ctx.fill();
  const sx=fdx*sz*.54,sy=fdy*sz*.54;
  ctx.fillStyle='#306020';ctx.beginPath();ctx.ellipse(sx,sy,sz*.10,sz*.065,Math.atan2(fdy,fdx),0,Math.PI*2);ctx.fill();
  ctx.fillStyle='rgba(255,80,0,.7)';ctx.beginPath();ctx.arc(sx+fdx*sz*.04,sy+fdy*sz*.04,sz*.022,0,Math.PI*2);ctx.fill();
  [.45,-.45].forEach(s=>{
    const ex=hx+rdx*s*sz*.09,ey=hy+rdy*s*sz*.09;
    ctx.fillStyle='#e0f8e0';ctx.beginPath();ctx.arc(ex,ey,sz*.05,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#ff4000';ctx.beginPath();ctx.ellipse(ex,ey,sz*.017,sz*.042,Math.atan2(fdy,fdx)+Math.PI/2,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='rgba(255,255,200,.6)';ctx.beginPath();ctx.arc(ex-sz*.012,ey-sz*.012,sz*.012,0,Math.PI*2);ctx.fill();
  });
  for(let i=0;i<4;i++){const r2=sz*(.1-i*.022);ctx.fillStyle='#408030';ctx.beginPath();ctx.arc(-fdx*sz*.18*(i+1)*.22,-fdy*sz*.18*(i+1)*.22,Math.max(2,r2),0,Math.PI*2);ctx.fill();}
  ctx.fillStyle='#a0ff60';ctx.strokeStyle='rgba(0,0,0,.3)';ctx.lineWidth=.5;
  for(let i=0;i<3;i++){const f=(i+.5)/3,tx3=-fdx*sz*.54*f,ty3=-fdy*sz*.54*f;ctx.beginPath();ctx.moveTo(tx3,ty3-sz*.04);ctx.lineTo(tx3+rdx*sz*.05,ty3+sz*.04);ctx.lineTo(tx3-rdx*sz*.05,ty3+sz*.04);ctx.closePath();ctx.fill();ctx.stroke();}
  ctx.restore();
  if(elapsed!=null){
    const l=elapsed.toFixed(1)+'s',bw2=l.length*6+12,bh2=15;
    ctx.fillStyle='rgba(0,0,0,.78)';
    if(ctx.roundRect)ctx.roundRect(px-bw2/2,py2-sz*.76-bh2,bw2,bh2,4);else ctx.rect(px-bw2/2,py2-sz*.76-bh2,bw2,bh2);
    ctx.fill();ctx.fillStyle='#80d0ff';ctx.font=`bold ${T*.25}px Cinzel,serif`;
    ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText(l,px,py2-sz*.76-bh2/2);
  }
}
function drawMinion(){
  const m=GS.myMinion;if(!m||GS.phase!=='racing')return;
  const px=sc(m.px),py=sc(m.py);
  if(_lmx!==null){const dx=px-_lmx,dy=py-_lmy;if(Math.hypot(dx,dy)>.5)_ddir=_dir8(dx,dy);}
  _lmx=px;_lmy=py;
  drawDragon(px,py,_ddir,raceStartTime!=null?(Date.now()-raceStartTime)/1000:null);
}

// ── Input ──────────────────────────────────────────────
function cellFromXY(cx2,cy2){
  const rect=canvas.getBoundingClientRect();
  const dpr=window.devicePixelRatio||1;
  const scx=CW/rect.width, scy=CH/rect.height;
  return{r:Math.floor((cy2-rect.top)*scy/TILE),c:Math.floor((cx2-rect.left)*scx/TILE)};
}

canvas.addEventListener('click',e=>{
  if(GS.phase!=='placing') return;
  const{r,c}=cellFromXY(e.clientX,e.clientY);
  const taCols=GS.cols||COLS, taRows=GS.rows||ROWS;
  if(r<0||r+1>=taRows||c<0||c+1>=taCols) return;
  if(selectedTool==='remove'){
    const t=(GS.myTowers||[]).find(t=>(r===t.row||r===t.row+1)&&(c===t.col||c===t.col+1));
    if(t) sendAction('ta_remove_tower',{towerId:t.id});
  } else {
    sendAction('ta_place_tower',{type:selectedTool,row:r,col:c});
  }
});
canvas.addEventListener('mousemove',e=>{hoverCell=cellFromXY(e.clientX,e.clientY);});
canvas.addEventListener('touchmove',e=>{e.preventDefault();hoverCell=cellFromXY(e.touches[0].clientX,e.touches[0].clientY);},{passive:false});
canvas.addEventListener('touchend',e=>{
  e.preventDefault();
  if(GS.phase!=='placing') return;
  const t=e.changedTouches[0];
  const{r,c}=cellFromXY(t.clientX,t.clientY);
  const taCols=GS.cols||COLS, taRows=GS.rows||ROWS;
  if(r<0||r+1>=taRows||c<0||c+1>=taCols) return;
  sendAction('ta_place_tower',{type:selectedTool,row:r,col:c});
});

function selectTool(t){
  if(t==='effect') t=_effectBlockId;
  selectedTool=t;
  document.querySelectorAll('.bld-btn').forEach(b=>b.classList.remove('sel'));
  // Map tool to button id
  const btnId = t==='wall_block'?'btn-wall_block':t==='remove'?'btn-remove':'btn-effect';
  const el=document.getElementById(btnId);
  if(el) el.classList.add('sel');
}

function setEffectBlock(block){
  _effectBlockId=block.id;
  const nm=document.getElementById('effect-nm');
  if(nm) nm.textContent=block.name||'Effekt';
  const btn=document.getElementById('btn-effect');
  if(btn) btn.childNodes[0].textContent=block.icon||'🌿';
  if(selectedTool!=='wall_block'&&selectedTool!=='remove') selectedTool=block.id;
}

function sendAction(action,data={}){
  if(!socket||!sessionId) return;
  socket.emit('game:action',{sessionId,action,data});
}

function sendReady(){
  if(GS.phase!=='placing') return;
  const sess=JSON.parse(sessionStorage.getItem('mp_session')||'null');
  const isSolo=sess&&sess.solo;
  document.getElementById('btn-ready').disabled=true;
  document.getElementById('btn-ready').textContent=isSolo?'⏳ Starte…':'⏳ Warte auf andere…';
  sendAction('ta_ready',{});
  raceStartTime=Date.now();
}

function clearAll(){
  if(GS.phase!=='placing') return;
  (GS.myTowers||[]).filter(t=>!t._prebuilt).forEach(t=>sendAction('remove_tower',{towerId:t.id}));
}

function quitGame(){
  if(confirm('Spiel beenden?')){ if(socket)socket.disconnect(); sessionStorage.removeItem('mp_session'); window.location.href='/'; }
}

// ── Results ────────────────────────────────────────────
function showResults(round,players){
  const ov=document.getElementById('results-overlay');
  const sorted=Object.values(players).sort((a,b)=>(a.lastTime??Infinity)-(b.lastTime??Infinity));
  document.getElementById('res-title').textContent=`Runde ${round} — Ergebnis`;
  const pts=[10,3,1,0]; const medals=['🥇','🥈','🥉',''];
  document.getElementById('res-table').innerHTML=sorted.map((p,i)=>`
    <div style="display:flex;gap:16px;align-items:center;padding:4px 12px">
      <span style="font-size:18px">${medals[i]||''}</span>
      <span style="flex:1;color:${p.userId===myUserId?'var(--gold)':'#c0a060'}">${p.username}</span>
      <span style="color:#80d0ff;min-width:60px">${p.lastTime?formatTime(p.lastTime):'–'}</span>
      <span style="color:var(--gold);min-width:32px">+${pts[i]||0}pt</span>
      <span style="color:#a09040">${p.score||0}pt</span>
    </div>`).join('');
  const isLast=round>=(GS.totalRounds||5); // round is 1-based here (endRound did ++)
  document.getElementById('res-next').textContent=isLast?'':
    `Nächste Runde in 5s…`;
  ov.classList.add('on');
  if(!isLast) setTimeout(()=>ov.classList.remove('on'),3500);
}

function showFinalResults(rankings){
  const ov=document.getElementById('results-overlay');
  document.getElementById('res-title').textContent='🏆 Endergebnis';
  const medals=['🥇','🥈','🥉','','','','',''];
  document.getElementById('res-table').innerHTML=rankings.map((p,i)=>`
    <div style="display:flex;gap:16px;align-items:center;padding:4px 12px">
      <span style="font-size:18px">${medals[i]||''}</span>
      <span style="flex:1;color:${p.userId===myUserId?'var(--gold)':'#c0a060'};font-size:${i===0?14:12}px">${p.username}</span>
      <span style="color:var(--gold);font-weight:900">${p.score||0} Punkte</span>
    </div>`).join('');
  document.getElementById('res-next').innerHTML='<button onclick="window.location.href=\'/\'" style="margin-top:12px;padding:10px 24px;background:rgba(60,120,60,.3);border:1px solid #3a7020;color:#80e060;font-family:Cinzel,serif;font-size:12px;border-radius:6px;cursor:pointer">← Zurück zum Menü</button>';
  ov.classList.add('on');
}

let _toastT=null;
function toast(msg){
  const el=document.getElementById('toast');
  el.textContent=msg; el.style.background='rgba(180,40,20,.92)';
  el.style.border='1px solid #a02010'; el.style.color='#ffb0a0';
  el.classList.remove('on'); void el.offsetWidth; el.classList.add('on');
  clearTimeout(_toastT); _toastT=setTimeout(()=>el.classList.remove('on'),2500);
}

// ── Boot ───────────────────────────────────────────────
function loop(){ requestAnimationFrame(loop); render(); }

(function boot(){
  const wrap=document.getElementById('canvaswrap');
  const ro=new ResizeObserver(()=>{applyLayout();ro.disconnect();});
  ro.observe(wrap);
  window.addEventListener('resize',applyLayout);
  window.addEventListener('load',()=>{applyLayout();connect();requestAnimationFrame(loop);});
})();
</script>
