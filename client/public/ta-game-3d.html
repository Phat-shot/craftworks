<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<title>⏱️ Time Attack 3D</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&display=swap" rel="stylesheet">
<style>
:root{--gold:#f0c840;--bg:#040208;--green:#50d040;--red:#e03020}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;touch-action:none;font-family:'Cinzel',serif;background:var(--bg);color:#e0c870;display:flex;flex-direction:column}
#topbar{background:linear-gradient(180deg,#0a0614,#060310);border-bottom:2px solid #2a1040;padding:5px 12px;display:flex;align-items:center;gap:12px;flex-shrink:0}
#topbar .res{display:flex;align-items:center;gap:4px;font-size:13px;font-weight:700}
#topbar .gold-val{color:var(--gold)}
#topbar .wood-val{color:#a06020}
#round-info{font-size:11px;color:#8070a0;margin-left:auto}
#canvaswrap{flex:1;overflow:hidden;position:relative}
#threecanvas{width:100%;height:100%;display:block}
#toast{position:absolute;top:10px;left:50%;transform:translateX(-50%);font-size:12px;padding:8px 18px;border-radius:20px;pointer-events:none;display:none;z-index:300;background:rgba(180,40,20,.92);border:1px solid #a02010;color:#ffb0a0}
#toast.on{display:block;animation:fadeout 3s forwards}
@keyframes fadeout{0%,65%{opacity:1}100%{opacity:0}}
#results-overlay{position:absolute;inset:0;background:rgba(0,0,0,.85);display:none;flex-direction:column;align-items:center;justify-content:center;z-index:200}
#results-overlay.on{display:flex}
#results-overlay h2{font-size:22px;color:var(--gold);margin-bottom:12px}
#results-overlay .time{font-size:36px;color:#80ff80;margin-bottom:20px}
#botbar{background:linear-gradient(0deg,#0a0614,#060310);border-top:2px solid #2a1040;padding:8px 12px;display:flex;align-items:center;gap:8px;flex-shrink:0;min-height:70px}
#sel-info{flex:1;font-size:11px;color:#6050a0;min-width:0}
#panel-top{display:flex;gap:5px;flex-wrap:wrap}
.cmd-btn{background:rgba(40,20,70,.8);border:1.5px solid #3a1860;color:#c0a0f0;border-radius:7px;padding:6px 10px;cursor:pointer;font-family:'Cinzel',serif;font-size:10px;display:flex;flex-direction:column;align-items:center;gap:2px;min-width:52px;transition:border-color .15s,background .15s}
.cmd-btn:hover{border-color:var(--gold);background:rgba(60,30,90,.9)}
.cmd-btn:disabled{opacity:.4;cursor:default}
.cmd-btn .cmd-ic{font-size:18px}
.cmd-btn .cmd-nm{font-size:8px;font-weight:700;color:#a090d0}
.cmd-btn .cmd-co{font-size:9px;color:var(--gold)}
.cmd-btn.sel{border-color:var(--gold);background:rgba(80,50,10,.4)}
#btn-ready{background:linear-gradient(180deg,rgba(60,160,20,.5),rgba(30,100,10,.4));border:2px solid #3a8020;color:#80ff40;border-radius:8px;padding:8px 16px;cursor:pointer;font-family:'Cinzel',serif;font-size:11px;font-weight:700;white-space:nowrap}
#btn-ready:disabled{opacity:.5;cursor:default}
#phase-label{font-size:9px;color:var(--green);text-transform:uppercase;letter-spacing:1px}
</style>
</head>
<body>
<div id="topbar">
  <div class="res">💰 <span class="gold-val" id="v-gold">0</span></div>
  <div class="res">🪵 <span class="wood-val" id="v-wood">0</span></div>
  <div id="round-info">Runde <span id="v-round">1</span>/<span id="v-total">10</span></div>
  <div id="phase-label" style="margin-left:8px">⏳ Platzieren</div>
  <div style="margin-left:8px;font-size:11px;color:#8060a0" id="v-time">—</div>
</div>
<div id="canvaswrap">
  <canvas id="threecanvas"></canvas>
  <div id="toast"></div>
  <div id="results-overlay">
    <h2 id="res-title">Runde beendet</h2>
    <div class="time" id="res-time">—</div>
    <div style="font-size:12px;color:#8070a0" id="res-rank"></div>
  </div>
</div>
<div id="botbar">
  <div id="sel-info">Wähle Block-Typ dann auf Grid klicken</div>
  <div id="panel-top">
    <button class="cmd-btn sel" id="btn-wall" onclick="setTool('wall_block')">
      <span class="cmd-ic">🧱</span><span class="cmd-nm">Mauer</span><span class="cmd-co">1💰</span>
    </button>
    <button class="cmd-btn" id="btn-slow" onclick="setTool('slow_block')">
      <span class="cmd-ic">🌿</span><span class="cmd-nm">Slow</span><span class="cmd-co">1🪵</span>
    </button>
    <button class="cmd-btn" id="btn-clear" onclick="clearMyTowers()">
      <span class="cmd-ic">🗑️</span><span class="cmd-nm">Löschen</span><span class="cmd-co">Alle</span>
    </button>
  </div>
  <button id="btn-ready" onclick="sendReady()">✓ Fertig — Rennen starten</button>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="/socket.io/socket.io.js"></script>
<script src="/game-common.js"></script>
<script>
'use strict';

// ── Grid config ──────────────────────────────────────────
let COLS=35, ROWS=50, TILE=1.0; // 1 unit per tile in 3D space
let ENTRY_COL=17;
(function initDims(){
  try{const s=JSON.parse(sessionStorage.getItem('mp_session')||'null');
    const tl=s?.workshopConfig?.ta_layout;
    if(tl?.cols)COLS=tl.cols; if(tl?.rows)ROWS=tl.rows;
    ENTRY_COL=Math.floor(COLS/2);
  }catch(e){}
})();

let GS={phase:'placing',round:0,totalRounds:10,players:{},myTowers:[],myPath:[],myMinion:null,entryCol:ENTRY_COL};
let myUserId=null, sessionId=null, socket=null;
let selectedTool='wall_block', myGold=0, myWood=0;

// ── Three.js scene ───────────────────────────────────────
const canvas3d = document.getElementById('threecanvas');
const renderer = new THREE.WebGLRenderer({canvas:canvas3d, antialias:true});
renderer.shadowMap.enabled=true;
renderer.shadowMap.type=THREE.PCFSoftShadowMap;
renderer.setClearColor(0x050308);

const scene = new THREE.Scene();
scene.fog = new THREE.FogExp2(0x050308, 0.018);

// Camera: isometric-ish perspective, tilted over the grid
const cam = new THREE.PerspectiveCamera(45, 1, 0.1, 200);
let camTarget={x:COLS/2, y:0, z:ROWS/2};
let camAngleH=0, camAngleV=0.7, camDist=30;
function updateCamera(){
  cam.position.x=camTarget.x+Math.sin(camAngleH)*Math.cos(camAngleV)*camDist;
  cam.position.y=Math.sin(camAngleV)*camDist;
  cam.position.z=camTarget.z+Math.cos(camAngleH)*Math.cos(camAngleV)*camDist;
  cam.lookAt(camTarget.x, 0, camTarget.z);
}
updateCamera();

// Lights
const ambient=new THREE.AmbientLight(0x303048,1.5); scene.add(ambient);
const sun=new THREE.DirectionalLight(0xfff4e0,2.5);
sun.position.set(20,40,20); sun.castShadow=true;
sun.shadow.mapSize.set(2048,2048);
sun.shadow.camera.near=1; sun.shadow.camera.far=200;
sun.shadow.camera.left=-40; sun.shadow.camera.right=80;
sun.shadow.camera.top=60; sun.shadow.camera.bottom=-10;
scene.add(sun);
const fill=new THREE.DirectionalLight(0x4060ff,0.4);
fill.position.set(-10,10,-10); scene.add(fill);

// ── Materials ────────────────────────────────────────────
const MAT={
  grass: new THREE.MeshLambertMaterial({color:0x1a3010}),
  grass2:new THREE.MeshLambertMaterial({color:0x142808}),
  path:  new THREE.MeshLambertMaterial({color:0x3a2410}),
  wall:  new THREE.MeshLambertMaterial({color:0x8a7060}),
  wallTop:new THREE.MeshLambertMaterial({color:0xaa9080}),
  wallPrebuilt:new THREE.MeshLambertMaterial({color:0x6a5040}),
  slow:  new THREE.MeshLambertMaterial({color:0x204010,emissive:0x103008,emissiveIntensity:.4}),
  slowTop:new THREE.MeshLambertMaterial({color:0x50d020,emissive:0x30a010,emissiveIntensity:.6}),
  dragon:new THREE.MeshLambertMaterial({color:0xe03020,emissive:0x801000,emissiveIntensity:.3}),
  portal:new THREE.MeshLambertMaterial({color:0x2080ff,emissive:0x1040ff,emissiveIntensity:.8}),
  portalEnd:new THREE.MeshLambertMaterial({color:0xff4020,emissive:0xff2000,emissiveIntensity:.8}),
  pathHighlight:new THREE.MeshLambertMaterial({color:0x50c020,transparent:true,opacity:.4}),
  ghost: new THREE.MeshLambertMaterial({color:0x8080ff,transparent:true,opacity:.4,depthWrite:false}),
};

// ── Build ground grid ────────────────────────────────────
const tileGeo=new THREE.BoxGeometry(TILE,0.12,TILE);
const tileMap={}; // "r_c" -> mesh

function buildGround(){
  for(let r=0;r<ROWS;r++) for(let c=0;c<COLS;c++){
    const isPath=(c===ENTRY_COL);
    const mat=isPath?MAT.path:((r+c)%2===0?MAT.grass:MAT.grass2);
    const t=new THREE.Mesh(tileGeo,mat);
    t.position.set(c*TILE+TILE/2, -0.06, r*TILE+TILE/2);
    t.receiveShadow=true;
    t.userData={row:r,col:c,isTile:true};
    scene.add(t);
    tileMap[r+'_'+c]=t;
  }
}
buildGround();

// Start/end portals
function addPortal(r,c,mat,label){
  const geo=new THREE.CylinderGeometry(0.5,0.5,0.3,16);
  const m=new THREE.Mesh(geo,mat);
  m.position.set(c*TILE+TILE/2,0.15,r*TILE+TILE/2);
  m.castShadow=true; scene.add(m);
  const ring=new THREE.Mesh(new THREE.TorusGeometry(0.6,0.08,8,20),mat);
  ring.rotation.x=Math.PI/2; ring.position.set(c*TILE+TILE/2,0.3,r*TILE+TILE/2);
  scene.add(ring);
}
addPortal(0,ENTRY_COL,MAT.portal,'START');
addPortal(ROWS-1,ENTRY_COL,MAT.portalEnd,'ZIEL');

// ── Tower 3D meshes ──────────────────────────────────────
const towerMeshes={};

function makeTowerMesh(type,prebuilt){
  const group=new THREE.Group();
  if(type==='wall_block'||type==='wall'){
    const bodyMat=prebuilt?MAT.wallPrebuilt:MAT.wall;
    const body=new THREE.Mesh(new THREE.BoxGeometry(2,1.2,2),bodyMat);
    body.position.y=0.6; body.castShadow=true; group.add(body);
    const top=new THREE.Mesh(new THREE.BoxGeometry(2.1,0.2,2.1),MAT.wallTop);
    top.position.y=1.25; top.castShadow=true; group.add(top);
    if(prebuilt){
      // Gold star indicator
      const star=new THREE.Mesh(new THREE.SphereGeometry(0.18,8,8),
        new THREE.MeshLambertMaterial({color:0xf0c020,emissive:0xc09000,emissiveIntensity:.5}));
      star.position.set(0,1.6,0); group.add(star);
    }
  } else {
    // Slow/effect block: dark base + glowing top orb
    const base=new THREE.Mesh(new THREE.BoxGeometry(1.8,0.8,1.8),MAT.slow);
    base.position.y=0.4; base.castShadow=true; group.add(base);
    const orb=new THREE.Mesh(new THREE.SphereGeometry(0.5,12,12),MAT.slowTop);
    orb.position.y=1.2; orb.castShadow=true; group.add(orb);
    if(prebuilt){
      const star=new THREE.Mesh(new THREE.SphereGeometry(0.15,8,8),
        new THREE.MeshLambertMaterial({color:0xf0c020,emissive:0xc09000,emissiveIntensity:.5}));
      star.position.set(0.8,1.5,0); group.add(star);
    }
  }
  return group;
}

function tilePos(row,col){
  return {x:col*TILE+TILE/2, z:row*TILE+TILE/2};
}

function placeTowerMesh(id,type,row,col,prebuilt){
  const g=makeTowerMesh(type,prebuilt);
  const p=tilePos(row,col);
  g.position.set(p.x+TILE/2,0,p.z+TILE/2); // 2×2 footprint center
  scene.add(g);
  towerMeshes[id]=g;
}
function removeTowerMesh(id){
  if(!towerMeshes[id])return;
  scene.remove(towerMeshes[id]);
  delete towerMeshes[id];
}
function clearAllTowerMeshes(){
  Object.keys(towerMeshes).forEach(id=>removeTowerMesh(id));
}

// ── Dragon minion ────────────────────────────────────────
let dragonMesh=null;
const dragonGeo=new THREE.Group();
const dragonBody=new THREE.Mesh(new THREE.SphereGeometry(0.45,12,8),MAT.dragon);
dragonBody.scale.set(1.5,0.9,1);
dragonGeo.add(dragonBody);
const dragonHead=new THREE.Mesh(new THREE.BoxGeometry(0.5,0.35,0.4),MAT.dragon);
dragonHead.position.set(0.6,0.1,0);
dragonGeo.add(dragonHead);
const wingL=new THREE.Mesh(new THREE.ConeGeometry(0.5,0.9,4),
  new THREE.MeshLambertMaterial({color:0xc02010,transparent:true,opacity:.8}));
wingL.rotation.z=-Math.PI/3; wingL.position.set(0,0.3,-0.6);
dragonGeo.add(wingL);
const wingR=wingL.clone(); wingR.rotation.z=Math.PI/3; wingR.position.z=0.6;
dragonGeo.add(wingR);

// HP bar (canvas texture)
const hpCanvas=document.createElement('canvas');
hpCanvas.width=128;hpCanvas.height=20;
const hpCtx=hpCanvas.getContext('2d');
const hpTex=new THREE.CanvasTexture(hpCanvas);
const hpMesh=new THREE.Mesh(
  new THREE.PlaneGeometry(1.5,0.25),
  new THREE.MeshBasicMaterial({map:hpTex,transparent:true,depthTest:false})
);
hpMesh.renderOrder=999;

function updateHPBar(pct){
  hpCtx.clearRect(0,0,128,20);
  hpCtx.fillStyle='rgba(0,0,0,.7)'; hpCtx.fillRect(0,0,128,20);
  hpCtx.fillStyle=pct>0.5?'#60d040':pct>0.25?'#d0c020':'#e03020';
  hpCtx.fillRect(2,3,Math.round(124*pct),14);
  hpTex.needsUpdate=true;
}

function ensureDragon(){
  if(!dragonMesh){
    dragonMesh=dragonGeo.clone();
    dragonMesh.add(hpMesh.clone());
    scene.add(dragonMesh);
  }
}
function removeDragon(){
  if(dragonMesh){scene.remove(dragonMesh);dragonMesh=null;}
}

// ── Path visualization ────────────────────────────────────
const pathTiles=[];
function showPath(path){
  pathTiles.forEach(m=>scene.remove(m));
  pathTiles.length=0;
  if(!path||!path.length) return;
  const geo=new THREE.BoxGeometry(TILE*0.3,0.02,TILE*0.3);
  for(let i=1;i<path.length-1;i++){
    const [r,c]=path[i];
    const m=new THREE.Mesh(geo,MAT.pathHighlight);
    m.position.set(c*TILE+TILE/2,0.07,r*TILE+TILE/2);
    scene.add(m); pathTiles.push(m);
  }
}

// Ghost placement indicator
let ghostMesh=null;
function showGhost(row,col){
  if(!ghostMesh){
    ghostMesh=new THREE.Mesh(new THREE.BoxGeometry(2,1.2,2),MAT.ghost);
    ghostMesh.position.y=0.6; scene.add(ghostMesh);
  }
  const p=tilePos(row,col);
  ghostMesh.position.set(p.x+TILE/2,0.6,p.z+TILE/2);
  ghostMesh.visible=true;
}
function hideGhost(){ if(ghostMesh)ghostMesh.visible=false; }

// ── Raycasting for grid click ─────────────────────────────
const raycaster=new THREE.Raycaster();
const groundPlane=new THREE.Plane(new THREE.Vector3(0,1,0),0);
const mouse=new THREE.Vector2();
function getGridPos(event){
  const rect=canvas3d.getBoundingClientRect();
  mouse.x=((event.clientX-rect.left)/rect.width)*2-1;
  mouse.y=-((event.clientY-rect.top)/rect.height)*2+1;
  raycaster.setFromCamera(mouse,cam);
  const pt=new THREE.Vector3();
  raycaster.ray.intersectPlane(groundPlane,pt);
  const col=Math.floor(pt.x/TILE);
  const row=Math.floor(pt.z/TILE);
  if(col<0||col>=COLS||row<0||row>=ROWS) return null;
  return {row,col};
}

// Camera drag
let isDragging=false, lastMX=0, lastMY=0;
canvas3d.addEventListener('pointerdown',e=>{
  isDragging=true; lastMX=e.clientX; lastMY=e.clientY;
  canvas3d.setPointerCapture(e.pointerId);
});
canvas3d.addEventListener('pointermove',e=>{
  const gp=getGridPos(e);
  if(gp&&GS.phase==='placing') showGhost(gp.row,gp.col); else hideGhost();
  if(!isDragging) return;
  const dx=(e.clientX-lastMX)/canvas3d.clientWidth;
  const dy=(e.clientY-lastMY)/canvas3d.clientHeight;
  if(e.buttons===2||e.ctrlKey){ // right drag = rotate
    camAngleH-=dx*3;
    camAngleV=Math.max(0.15,Math.min(1.4,camAngleV-dy*2));
  } else { // left drag = pan
    const panX=dx*camDist*0.8, panZ=dy*camDist*0.8;
    camTarget.x=Math.max(0,Math.min(COLS,camTarget.x-Math.cos(camAngleH)*panX+Math.sin(camAngleH)*panZ));
    camTarget.z=Math.max(0,Math.min(ROWS,camTarget.z+Math.sin(camAngleH)*panX+Math.cos(camAngleH)*panZ));
  }
  lastMX=e.clientX; lastMY=e.clientY;
  updateCamera();
});
canvas3d.addEventListener('pointerup',()=>{isDragging=false;});
canvas3d.addEventListener('click',e=>{
  if(!socket||!sessionId||GS.phase!=='placing') return;
  const gp=getGridPos(e);
  if(!gp) return;
  sendAction('ta_place_tower',{type:selectedTool,row:gp.row,col:gp.col});
});
canvas3d.addEventListener('contextmenu',e=>{e.preventDefault();});
canvas3d.addEventListener('wheel',e=>{
  camDist=Math.max(8,Math.min(80,camDist+e.deltaY*0.05));
  updateCamera(); e.preventDefault();
},{passive:false});

// ── HUD ──────────────────────────────────────────────────
function updateHUD(){
  const me=GS.players?.[myUserId];
  if(me){myGold=me.gold??myGold;myWood=me.wood??myWood;}
  document.getElementById('v-gold').textContent=myGold;
  document.getElementById('v-wood').textContent=myWood;
  document.getElementById('v-round').textContent=(GS.round||0)+1;
  document.getElementById('v-total').textContent=GS.totalRounds||10;
  const phaseLabel=document.getElementById('phase-label');
  const phaseTxt={placing:'⚒️ Platzieren',racing:'⚡ Rennen läuft…',results:'🏁 Ergebnis'};
  phaseLabel.textContent=phaseTxt[GS.phase]||GS.phase;
  const btn=document.getElementById('btn-ready');
  if(GS.phase==='placing'&&!btn.disabled) btn.textContent='✓ Fertig — Rennen starten';
  if(GS.phase==='racing') btn.disabled=true;
  if(GS.phase==='placing') btn.disabled=false;
}

function toast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg; t.className='on';
  clearTimeout(t._t); t._t=setTimeout(()=>t.className='',3000);
}

function setTool(type){
  selectedTool=type;
  document.getElementById('btn-wall').className='cmd-btn'+(type==='wall_block'?' sel':'');
  document.getElementById('btn-slow').className='cmd-btn'+(type==='slow_block'?' sel':'');
}

function clearMyTowers(){
  (GS.myTowers||[]).filter(t=>!t._prebuilt).forEach(t=>{
    sendAction('ta_remove_tower',{towerId:t.id});
  });
}

function sendReady(){
  if(GS.phase!=='placing') return;
  sendAction('ta_ready',{});
  document.getElementById('btn-ready').disabled=true;
}

// ── Sync towers to 3D scene ───────────────────────────────
let lastTowerIds=new Set();
function syncTowers(towers){
  const newIds=new Set((towers||[]).map(t=>t.id));
  // Remove stale
  for(const id of lastTowerIds) if(!newIds.has(id)) removeTowerMesh(id);
  // Add new
  for(const t of (towers||[])){
    if(!towerMeshes[t.id]) placeTowerMesh(t.id,t.type,t.row,t.col,!!t._prebuilt);
  }
  lastTowerIds=newIds;
}

// ── Results overlay ───────────────────────────────────────
function showResults(round,players,isLast){
  const ov=document.getElementById('results-overlay');
  const me=players?.[myUserId];
  const t=me?.lastTime;
  document.getElementById('res-title').textContent=isLast?'Spiel beendet!':'Runde '+round+' beendet';
  document.getElementById('res-time').textContent=t?t.toFixed(2)+'s':'—';
  document.getElementById('res-rank').textContent='Punkte: '+(me?.score||0);
  ov.className='on';
  if(!isLast) setTimeout(()=>{ov.className='';},3500);
}

// ── Socket connection ─────────────────────────────────────
function connect(){
  const sess=JSON.parse(sessionStorage.getItem('mp_session')||'null');
  if(!sess)return;
  myUserId=sess.userId; sessionId=sess.sessionId;
  const token=localStorage.getItem('access_token');
  socket=io({auth:{token}});

  let _started=false;
  socket.on('connect',()=>{
    const s=JSON.parse(sessionStorage.getItem('mp_session')||'null');
    if(!s) return;
    if(s.solo){
      if(_started){if(sessionId)socket.emit('game:join',{sessionId});return;}
      _started=true;
      socket.emit('game:solo_start',{
        difficulty:s.difficulty||'normal',
        race:'standard',
        workshopConfig:s.workshopConfig,
        mode:s.mode||'time_attack',
      });
    } else {
      socket.emit('game:join',{sessionId});
    }
  });

  socket.on('game:solo_started',({sessionId:sid,mode:m})=>{
    sessionId=sid;
    const sess=JSON.parse(sessionStorage.getItem('mp_session')||'{}')||{};
    sess.sessionId=sid;
    sessionStorage.setItem('mp_session',JSON.stringify(sess));
    if(m==='td'||m==='solo'){window.location.href='/td-game.html';return;}
    if(m==='vs'){window.location.href='/vs-game.html';return;}
  });

  socket.on('game:ta_tick',snap=>{
    const prevPhase=GS.phase;
    GS=snap;
    if(snap.cols&&snap.cols!==COLS){COLS=snap.cols;}
    if(snap.rows&&snap.rows!==ROWS){ROWS=snap.rows;}
    if(snap.entryCol!==undefined) ENTRY_COL=snap.entryCol;
    if(prevPhase!==snap.phase&&snap.phase==='placing'){
      clearAllTowerMeshes();
      lastTowerIds=new Set();
    }
    const me=snap.players?.[myUserId];
    if(me){myGold=me.gold??myGold;myWood=me.wood??myWood;}
    const myData=snap.players?.[myUserId];
    const towers=myData?snap.myTowers||[]:[];
    syncTowers(towers);
    showPath(snap.myPath||[]);
    // Dragon
    const minion=snap.myMinion;
    if(minion&&!minion.reached&&!minion.escaped){
      ensureDragon();
      dragonMesh.position.set(minion.px*TILE, 0.8, minion.py*TILE);
      dragonMesh.children.forEach(c=>{
        if(c.geometry?.type==='PlaneGeometry'){
          c.lookAt(cam.position);
          c.position.set(0,1.2,0);
          updateHPBar(minion.hp/minion.maxHp);
        }
      });
    } else { removeDragon(); }
    // Time display
    if(snap.phase==='racing'&&me?.lastTime){
      document.getElementById('v-time').textContent=me.lastTime.toFixed(2)+'s';
    } else {
      document.getElementById('v-time').textContent='—';
    }
    updateHUD();
  });

  socket.on('game:ta_round_end',({round,players})=>{
    const isLast=round>=(GS.totalRounds||10);
    showResults(round,players,isLast);
  });

  socket.on('game:action_result',({action,ok,err})=>{
    if(!ok){
      const msgs={no_resources:'Nicht genug Ressourcen!',blocks_path:'⚠️ Würde Weg blockieren!',
        no_session:'Verbindung verloren',not_placing:'Warte auf Start'};
      toast(msgs[err]||err||'Fehler');
    }
  });

  socket.on('game:error',e=>toast('Fehler: '+(e.message||e)));
  socket.on('game:over',()=>{
    setTimeout(()=>{window.location.href='/';},5000);
  });
}

function sendAction(action,data={}){
  if(!socket||!sessionId)return;
  socket.emit('game:action',{sessionId,action,data});
}

// ── Resize handling ───────────────────────────────────────
function onResize(){
  const w=canvas3d.clientWidth, h=canvas3d.clientHeight;
  renderer.setSize(w,h,false);
  cam.aspect=w/h; cam.updateProjectionMatrix();
}
window.addEventListener('resize',onResize);
onResize();

// ── Animate ───────────────────────────────────────────────
let animT=0;
function animate(){
  requestAnimationFrame(animate);
  animT+=0.016;
  // Wing flap animation
  if(dragonMesh){
    dragonMesh.children.forEach((c,i)=>{
      if(c.geometry?.type==='ConeGeometry'){
        c.rotation.z=c.userData.baseRotZ+(Math.sin(animT*4)*0.3);
      }
    });
  }
  // Slow orb pulse
  Object.values(towerMeshes).forEach(g=>{
    g.children.forEach(c=>{
      if(c.material===MAT.slowTop){
        c.position.y=1.2+Math.sin(animT*2+g.position.x)*0.08;
      }
    });
  });
  renderer.render(scene,cam);
}
animate();

// ── Boot ─────────────────────────────────────────────────
window.addEventListener('load',()=>{ connect(); onResize(); });
</script>
</body>
