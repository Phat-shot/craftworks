<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<title>⚔ Warcraft TD</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&display=swap" rel="stylesheet">
<style>
:root{--gold:#f0c840;--bg:#06040c;--border:#4a3008}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;touch-action:none;user-select:none}
body{font-family:'Cinzel',serif;background:var(--bg);color:#e0c870;display:flex;flex-direction:column}

#topbar{background:linear-gradient(180deg,#1c1004,#0c0800);border-bottom:2px solid var(--border);
  padding-top:calc(env(safe-area-inset-top,0) + 5px);padding-bottom:5px;padding-left:8px;padding-right:8px;
  display:flex;align-items:center;flex-shrink:0}
.res{display:flex;align-items:center;gap:2px;padding:0 4px;font-size:12px;white-space:nowrap}
.res .lbl{font-size:7px;color:#503820;letter-spacing:.5px}
.res .v{color:var(--gold);font-weight:700;min-width:24px}
#v-lives{color:#ff5040!important}
.tsep{width:1px;background:#2a1806;align-self:stretch;margin:2px 0}
.wbadge{font-size:10px;color:#c0a840;font-weight:700;margin-left:auto}

#canvaswrap{flex:1;overflow:hidden;position:relative;touch-action:none;background:#1a2a10}
canvas{display:block;touch-action:none;position:absolute;top:50%;left:50%;transform:translate(-50%,-50%)}

#diff-screen{position:absolute;inset:0;z-index:300;background:rgba(4,2,8,.97);
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px;padding:20px}
#diff-screen h1{font-size:28px;font-weight:900;color:var(--gold);text-shadow:0 0 30px #f0804060;text-align:center;line-height:1.3}
#diff-screen .sub{font-size:10px;color:#604828;text-align:center;line-height:1.7}
.diff-btns{display:flex;flex-direction:column;gap:10px;width:100%;max-width:300px}
.diff-btn{padding:14px;font-family:'Cinzel',serif;font-size:13px;font-weight:700;border-radius:4px;cursor:pointer;text-align:center;border:2px solid}
.diff-easy{background:linear-gradient(180deg,#143010,#0a1a08);border-color:#2a6020;color:#80e060}
.diff-norm{background:linear-gradient(180deg,#302808,#1a1604);border-color:#a08020;color:var(--gold)}
.diff-hard{background:linear-gradient(180deg,#301008,#1a0804);border-color:#a02010;color:#ff8060}
.diff-expert{background:linear-gradient(180deg,#280828,#140414);border-color:#801880;color:#e060e0}
.diff-horror{background:linear-gradient(180deg,#280808,#140404);border-color:#c00000;color:#ff4040;animation:horror-pulse 2s ease-in-out infinite}
@keyframes horror-pulse{0%,100%{box-shadow:none}50%{box-shadow:0 0 18px rgba(200,0,0,.6)}}
.diff-badge{font-size:9px;font-weight:400;margin-top:2px;opacity:.8}

#gameover{display:none;position:absolute;inset:0;background:rgba(2,1,0,.93);
  backdrop-filter:blur(6px);align-items:center;justify-content:center;
  flex-direction:column;gap:14px;z-index:200;text-align:center}
#gameover.on{display:flex}
#go-title{font-size:36px;font-weight:900;color:var(--gold);text-shadow:0 0 40px #f08030}
#go-sub{font-size:12px;color:#a09040;line-height:2.2}
.restart-btn{background:linear-gradient(180deg,#402808,#1c1002);border:2px solid #a08828;
  color:#f0e060;font-family:'Cinzel',serif;font-size:14px;font-weight:700;
  padding:14px 36px;border-radius:4px;cursor:pointer;min-height:52px}

#toast{position:absolute;top:8px;left:50%;transform:translateX(-50%);
  font-size:11px;padding:7px 16px;border-radius:20px;pointer-events:none;
  display:none;z-index:300;white-space:pre-line;text-align:center;max-width:85vw;line-height:1.5}
#toast.on{display:block;animation:fadeout 3s forwards}
@keyframes fadeout{0%,65%{opacity:1}100%{opacity:0}}

#sheet{position:absolute;left:0;right:0;bottom:0;z-index:150;
  background:linear-gradient(180deg,#1a0e04,#0e0800);
  border-top:2px solid #6a3810;border-radius:14px 14px 0 0;
  transform:translateY(100%);transition:transform .22s ease;
  max-height:75vh;overflow-y:auto;padding:10px 14px 18px}
#sheet.open{transform:translateY(0)}
.sh-handle{width:36px;height:4px;background:#3a2808;border-radius:2px;margin:0 auto 10px;cursor:pointer;flex-shrink:0}
.sh-head{display:flex;align-items:center;gap:10px;margin-bottom:8px}
#sh-canvas{border-radius:4px;border:1px solid #3a2808;flex-shrink:0}
#sh-name{font-size:14px;font-weight:900;color:var(--gold);line-height:1.2}
#sh-lvl{font-size:8px;color:#503828;margin-top:2px}
.sh-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:4px;margin-bottom:8px}
.sh-stat{background:#0a0602;border:1px solid #2a1806;border-radius:3px;padding:4px;text-align:center}
.sh-sv{font-size:11px;font-weight:700;color:#e0c060}
.sh-sl{font-size:7px;color:#503820;margin-top:1px}
.path-section{background:#080602;border:1px solid #261808;border-radius:3px;margin-bottom:5px;overflow:hidden}
.path-hdr{display:flex;align-items:center;gap:5px;padding:5px 8px}
.path-ic{font-size:11px;flex-shrink:0}
.path-nm{font-size:9px;font-weight:700;color:#b09050;flex:1}
.path-dots{font-size:9px;letter-spacing:1px;color:#c09030;flex-shrink:0}
.path-btn{width:100%;background:linear-gradient(180deg,#121a08,#090e04);
  border:none;border-top:1px solid #201606;color:#68b028;
  font-family:'Cinzel',serif;font-size:9px;padding:7px 8px;cursor:pointer;text-align:left;line-height:1.4}
.path-btn:disabled{opacity:.35;cursor:not-allowed}
.path-btn.maxed{color:#808060;background:#060604}
.path-penalty{color:#c08030;font-size:8px}
.sh-sell{width:100%;background:linear-gradient(180deg,#200808,#100402);
  border:1px solid #401010;color:#b04040;cursor:pointer;
  padding:12px 8px;font-family:'Cinzel',serif;font-size:11px;
  border-radius:3px;margin-top:6px;display:flex;justify-content:space-between;align-items:center}
.sh-sell span{font-size:8px;color:#803030}
#sh-close{position:absolute;top:10px;right:14px;font-size:20px;color:#504030;cursor:pointer;padding:6px;line-height:1;z-index:5}

#botbar{flex-shrink:0;background:linear-gradient(180deg,#0c0800,#060400);border-top:2px solid var(--border);
  padding-bottom:env(safe-area-inset-bottom,0)}
#tower-row{display:flex;height:64px;border-bottom:1px solid #1a1004}
.twrb{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:1px;background:none;border:none;border-right:1px solid #181004;
  color:#806830;cursor:pointer;padding:2px 0;font-family:'Cinzel',serif;
  position:relative;transition:background .1s;overflow:hidden;min-width:0}
.twrb:last-child{border-right:none}
.twrb:active{background:rgba(255,200,60,.08)}
.twrb.sel{background:rgba(240,200,60,.10);color:var(--gold)}
.twrb.sel::after{content:'';position:absolute;bottom:0;left:0;right:0;height:3px;background:var(--gold)}
.twrb:disabled{opacity:.28;pointer-events:none}
.tw-nm{font-size:7px;font-weight:700;line-height:1;width:100%;text-align:center;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;padding:0 1px}
.tw-co{font-size:6px;color:#705828;line-height:1;width:100%;text-align:center;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;padding:0 1px}
.twrb.sel .sel-x{display:block}
.sel-x{display:none;position:absolute;top:2px;right:2px;background:#803010;color:#ffb090;font-size:7px;font-weight:700;border-radius:2px;padding:1px 3px;line-height:1}
#action-row{display:flex;height:50px}
#btn-wave{flex:1;background:linear-gradient(180deg,#3a2806,#1a1002);
  border:none;border-right:1px solid #201604;color:#f0d850;
  font-family:'Cinzel',serif;font-size:13px;font-weight:700;
  cursor:pointer;transition:background .1s;padding:0 8px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
#btn-wave:active{background:linear-gradient(180deg,#4a3810,#281a06)}
#btn-wave:disabled{opacity:.5;cursor:not-allowed}
#btn-spd{width:58px;background:#100e04;border:none;color:#706030;font-family:'Cinzel',serif;font-size:11px;
  cursor:pointer;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:1px}
#btn-spd.fast{color:var(--gold)}
#btn-orient{width:44px;background:#100e04;border:none;color:#706030;font-size:16px;cursor:pointer;
  display:flex;align-items:center;justify-content:center}
</style>
</head>
<body>

<div id="topbar">
  <div class="res">❤️<span class="lbl">LEBEN</span><span class="v" id="v-lives">50</span></div>
  <div class="tsep"></div>
  <div class="res">💰<span class="lbl">GOLD</span><span class="v" id="v-gold">150</span></div>
  <div class="tsep"></div>
  <div class="res">🏆<span class="v" id="v-score">0</span></div>
  <div class="tsep"></div>
  <div class="res">💀<span class="v" id="v-kills">0</span></div>
  <div class="wbadge" id="wbadge">Wave 0/25</div>
</div>

<div id="canvaswrap">
  <canvas id="gc"></canvas>
  <div id="toast"></div>
  <div id="diff-screen">
    <h1>⚔ WARCRAFT<br>TOWER DEFENSE</h1>
    <div class="sub">Wähle deinen Schwierigkeitsgrad.<br>Wave 5 & 15 = Luftangriff 🦅<br>Wave 10,20,25 = Boss 👑</div>
    <div class="diff-btns">
      <button class="diff-btn diff-easy"   onclick="startDiff('easy')">EASY<div class="diff-badge">100% HP</div></button>
      <button class="diff-btn diff-norm"   onclick="startDiff('normal')">NORMAL<div class="diff-badge">150% HP — empfohlen</div></button>
      <button class="diff-btn diff-hard"   onclick="startDiff('hard')">HARD<div class="diff-badge">200% HP</div></button>
      <button class="diff-btn diff-expert" onclick="startDiff('expert')">EXPERT<div class="diff-badge">250% HP</div></button>
      <button class="diff-btn diff-horror" onclick="startDiff('horror')">HORROR<div class="diff-badge">300% HP</div></button>
    </div>
  </div>
  <div id="gameover">
    <div id="go-title">GAME OVER</div>
    <div id="go-sub"></div>
    <button class="restart-btn" onclick="showDiffScreen()">▶ Nochmal spielen</button>
  </div>
  <div id="sheet">
    <div class="sh-handle" id="sh-handle"></div>
    <span id="sh-close" onclick="closeSheet()">✕</span>
    <div class="sh-head">
      <canvas id="sh-canvas" width="52" height="52"></canvas>
      <div><div id="sh-name"></div><div id="sh-lvl"></div></div>
    </div>
    <div class="sh-stats">
      <div class="sh-stat"><div class="sh-sv" id="sh-dmg"></div><div class="sh-sl">SCHADEN</div></div>
      <div class="sh-stat"><div class="sh-sv" id="sh-rng"></div><div class="sh-sl">REICHW.</div></div>
      <div class="sh-stat"><div class="sh-sv" id="sh-fps"></div><div class="sh-sl">FEUER/S</div></div>
    </div>
    <div id="sh-paths"></div>
    <button class="sh-sell" id="sh-sell-btn" onclick="doSell()">
      <span>💰 Verkaufen</span><span id="sh-sell-val"></span>
    </button>
  </div>
</div>

<div id="botbar">
  <div id="tower-row">
    <button class="twrb" id="btn-dart"      onclick="pickTower('dart')"     ><canvas id="tc-dart"      width="24" height="24"></canvas><div class="tw-nm">Dart</div><div class="tw-co">75g</div><span class="sel-x">✕</span></button>
    <button class="twrb" id="btn-poison"    onclick="pickTower('poison')"   ><canvas id="tc-poison"    width="24" height="24"></canvas><div class="tw-nm">Gift</div><div class="tw-co">100g</div><span class="sel-x">✕</span></button>
    <button class="twrb" id="btn-splash"    onclick="pickTower('splash')"   ><canvas id="tc-splash"    width="24" height="24"></canvas><div class="tw-nm">Kanone</div><div class="tw-co">125g</div><span class="sel-x">✕</span></button>
    <button class="twrb" id="btn-lightning" onclick="pickTower('lightning')" disabled><canvas id="tc-lightning" width="24" height="24"></canvas><div class="tw-nm">Blitz</div><div class="tw-co" id="lk-l">🔒W20</div><span class="sel-x">✕</span></button>
    <button class="twrb" id="btn-frost"     onclick="pickTower('frost')"     disabled><canvas id="tc-frost"     width="24" height="24"></canvas><div class="tw-nm">Frost</div><div class="tw-co" id="lk-f">🔒W10</div><span class="sel-x">✕</span></button>
  </div>
  <div id="action-row">
    <button id="btn-wave" onclick="startWave()">▶ Wave 1 starten</button>
    <button id="btn-spd"  onclick="toggleSpd()"><span style="font-size:18px">⏩</span><span id="spd-lbl">1×</span></button>
    <button id="btn-orient" onclick="cycleOrient()" title="Orientierung">🔄</button>
  </div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
'use strict';
// ═══════════════════════════════════════════════════════
//  CONSTANTS (mirrored from server — view only)
// ═══════════════════════════════════════════════════════
const COLS=25, ROWS=35, ENTRY_COL=12;

// Tower defs needed for UI only (costs, names, upgrade descriptions)
const TDB={
  dart:{name:'Dart',cost:75,col:'#3ab8ff',baseRange:3.5,baseCd:460,baseDmg:20,unlock:0,
    paths:[
      {id:'range',name:'Reichweite',icon:'🎯',upgrades:[{desc:'+0.4T',cost:55},{desc:'+0.7T',cost:88},{desc:'+1.0T',cost:130},{desc:'+1.4T',cost:188},{desc:'+2.0T',cost:265}]},
      {id:'pierce',name:'Durchschlag',icon:'➡️',upgrades:[{desc:'Pierce×1',cost:55},{desc:'Pierce×2',cost:88},{desc:'Pierce×3',cost:130},{desc:'Pierce×5',cost:188},{desc:'Pierce×8',cost:265}]},
      {id:'dmg',name:'Schaden',icon:'⚔️',upgrades:[{desc:'+10',cost:50},{desc:'+18',cost:80},{desc:'+28',cost:115},{desc:'+40',cost:165},{desc:'+55',cost:230}]}
    ]},
  poison:{name:'Gift',cost:100,col:'#44d040',baseRange:3.0,baseCd:1800,baseDmg:8,unlock:0,
    paths:[
      {id:'vir',name:'Virulenz',icon:'☠️',upgrades:[{desc:'DoT×1.3',cost:60},{desc:'DoT×1.7',cost:95},{desc:'DoT×2.2',cost:140},{desc:'DoT×3.0',cost:200},{desc:'DoT×4.0',cost:280}]},
      {id:'acid',name:'Säure',icon:'🧪',upgrades:[{desc:'-5%',cost:70},{desc:'-10%',cost:110},{desc:'-18%',cost:165},{desc:'-28%',cost:235},{desc:'-40%',cost:325}]},
      {id:'spread',name:'Ausbreitung',icon:'🦠',upgrades:[{desc:'20%',cost:65},{desc:'35%',cost:105},{desc:'50%',cost:155},{desc:'70%',cost:220},{desc:'90%',cost:310}]}
    ]},
  splash:{name:'Kanone',cost:125,col:'#ff7820',baseRange:2.8,baseCd:1600,baseDmg:48,unlock:0,
    paths:[
      {id:'nap',name:'Napalm',icon:'🔥',upgrades:[{desc:'Feuer 2s',cost:85},{desc:'Feuer 3s',cost:135},{desc:'Feuer 4s',cost:200},{desc:'Feuer 6s',cost:285},{desc:'Feuer 8s',cost:395}]},
      {id:'clust',name:'Clusterbombe',icon:'💥',upgrades:[{desc:'2 Mini',cost:90},{desc:'3 Mini',cost:145},{desc:'4 Mini',cost:215},{desc:'6 Mini',cost:305},{desc:'8 Mini',cost:420}]},
      {id:'pow',name:'Sprengkraft',icon:'💣',upgrades:[{desc:'+16',cost:70},{desc:'+28',cost:110},{desc:'+42',cost:160},{desc:'+58',cost:225},{desc:'+80',cost:315}]}
    ]},
  lightning:{name:'Blitz',cost:200,col:'#ffe840',baseRange:4.0,baseCd:860,baseDmg:62,unlock:20,
    paths:[
      {id:'volt',name:'Spannung',icon:'⚡',upgrades:[{desc:'+22',cost:90},{desc:'+38',cost:140},{desc:'+56',cost:205},{desc:'+78',cost:290},{desc:'+105',cost:400}]},
      {id:'chain',name:'Ketten',icon:'🔗',upgrades:[{desc:'+1',cost:95},{desc:'+2',cost:150},{desc:'+3',cost:220},{desc:'+4',cost:310},{desc:'+6',cost:430}]},
      {id:'over',name:'Überspannung',icon:'🌩️',upgrades:[{desc:'×3/5',cost:100},{desc:'×3/4',cost:160},{desc:'×3/3',cost:240},{desc:'×3/2',cost:335},{desc:'×3/1',cost:460}]}
    ]},
  frost:{name:'Frost',cost:175,col:'#80eeff',baseRange:3.6,baseCd:1150,baseDmg:18,unlock:10,
    paths:[
      {id:'deep',name:'Tiefkühlung',icon:'🧊',upgrades:[{desc:'62%',cost:85},{desc:'74%',cost:135},{desc:'84%',cost:200},{desc:'92%',cost:285},{desc:'98%',cost:395}]},
      {id:'field',name:'Eisfeld',icon:'❄️',upgrades:[{desc:'+0.5T',cost:90},{desc:'+0.9T',cost:145},{desc:'+1.4T',cost:215},{desc:'+2.0T',cost:305},{desc:'+2.8T',cost:420}]},
      {id:'shat',name:'Scherbeis',icon:'💎',upgrades:[{desc:'+5%',cost:80},{desc:'+10%',cost:130},{desc:'+18%',cost:195},{desc:'+28%',cost:275},{desc:'+40%',cost:380}]}
    ]},
};

function getUpgradeCost(t,pi){
  const lvl=t.paths[pi];if(lvl>=5)return null;
  const base=TDB[t.type].paths[pi].upgrades[lvl].cost;
  const others=t.paths.reduce((s,v,i)=>i!==pi?s+v:s,0);
  return Math.round(base*(1+others*0.35));
}

// ═══════════════════════════════════════════════════════
//  LAYOUT & ORIENTATION
// ═══════════════════════════════════════════════════════
let TILE,CW,CH;
let ORIENT='portrait'; // set properly on boot

function getOrient(){
  if(ORIENT!=='auto')return ORIENT;
  const wrap=document.getElementById('canvaswrap');
  const aw=wrap?wrap.clientWidth:window.innerWidth;
  const ah=wrap?wrap.clientHeight:window.innerHeight;
  return aw>=ah?'landscape':'portrait';
}

function computeLayout(){
  const wrap=document.getElementById('canvaswrap');
  const aw=wrap.clientWidth||window.innerWidth||880;
  const ah=wrap.clientHeight||Math.max(60,window.innerHeight-159)||560;
  const orient=getOrient();
  const tileByW=orient==='landscape'?Math.floor(aw/ROWS):Math.floor(aw/COLS);
  const tileByH=orient==='landscape'?Math.floor(ah/COLS):Math.floor(ah/ROWS);
  TILE=Math.max(10,Math.min(tileByW,tileByH));
  CW=TILE*COLS; CH=TILE*ROWS;
}

// Coordinate helpers: portrait (col,row) → screen (sx,sy)
function gx(px,py){return getOrient()==='landscape'?py:px;}
function gy(px,py){return getOrient()==='landscape'?px:py;}
function gcx(col,row){return getOrient()==='landscape'?row*TILE:col*TILE;}
function gcy(col,row){return getOrient()==='landscape'?col*TILE:row*TILE;}

function cycleOrient(){
  ORIENT=ORIENT==='portrait'?'landscape':'portrait';
  const icons={portrait:'📱',landscape:'🖥️'};
  document.getElementById('btn-orient').textContent=icons[ORIENT];
  applyLayout();
}

function applyLayout(){
  computeLayout();
  const orient=getOrient();
  canvas.width  = orient==='landscape'?CH:CW;
  canvas.height = orient==='landscape'?CW:CH;
  buildTextures();
}

// ═══════════════════════════════════════════════════════
//  CLIENT STATE (received from server)
// ═══════════════════════════════════════════════════════
let GS = {
  gameTime:0, wave:0, waveActive:false, gameOver:false,
  sharedLives:50, players:{}, towers:[], enemies:[],
  bullets:[], particles:[], bolts:[], fireZones:[],
  pathSet:new Set(), globalPath:null,
};
let prevGS = null;   // previous snapshot for interpolation
let snapTime = 0;    // when last snap arrived (performance.now())
let snapInterval = 50; // ms between server ticks (50ms = 20/s)
let myGold=150, myScore=0, myKills=0;
let pickedType=null, selTower=null, hoverCell=null;
let speedMult=1;
let sessionId=null, myUserId=null;
let socket=null;

// ═══════════════════════════════════════════════════════
//  SOCKET CONNECTION
// ═══════════════════════════════════════════════════════
function connectSocket(){
  const sess=JSON.parse(sessionStorage.getItem('mp_session')||'null');
  if(!sess)return; // standalone: no socket
  myUserId=sess.userId;
  sessionId=sess.sessionId;

  const token=localStorage.getItem('access_token');
  socket=io({auth:{token}});

  socket.on('connect',()=>{
    if(!sess.solo){
      socket.emit('game:join',{sessionId});
    }
    // solo: wait for user to pick difficulty in diff screen
  });

  socket.on('game:solo_started',({sessionId:sid})=>{
    sessionId=sid;
    hideDiffScreen();
  });

  socket.on('game:tick',(snap)=>{
    prevGS=GS;
    const now=performance.now();
    if(snapTime>0)snapInterval=Math.max(16,Math.min(100,now-snapTime))*0.9+snapInterval*0.1;
    snapTime=now;
    GS=snap;
    GS.pathSet=new Set(snap.pathSet||[]);
    // Update my gold/score/kills from player state
    const me=snap.players[myUserId];
    if(me){
      myGold=me.gold||0;
      myScore=me.score||0;
      myKills=me.kills||0;
    }
    updateHUD();
    refreshTwrBtns();
  });

  socket.on('game:wave_started',({wave})=>{
    toast(`Wave ${wave} gestartet!`,false);
    document.getElementById('btn-wave').disabled=true;
    document.getElementById('btn-wave').textContent=`⚔ Wave ${wave}…`;
    // Unlock towers
    if(wave>=10){
      document.getElementById('btn-frost').disabled=false;
      document.getElementById('lk-f').textContent='175g';
    }
    if(wave>=20){
      document.getElementById('btn-lightning').disabled=false;
      document.getElementById('lk-l').textContent='200g';
    }
  });

  socket.on('game:wave_ended',({wave,bonus})=>{
    toast(`✓ Wave ${wave} — +${bonus}💰 Bonus!`,false);
    document.getElementById('btn-wave').disabled=wave>=25;
    document.getElementById('btn-wave').textContent=
      wave>=25?'✅ Alle 25 Waves!':`▶ Wave ${wave+1} starten`;
  });

  socket.on('game:over',({win,rankings})=>{
    document.getElementById('go-title').textContent=win?'🏆 SIEG!':'💀 GAME OVER';
    const me=rankings.find(r=>r.userId===myUserId);
    document.getElementById('go-sub').innerHTML=
      `Wave ${GS.wave}/25<br>Score: ${me?.score||0}<br>Kills: ${me?.kills||0}`;
    document.getElementById('gameover').classList.add('on');
  });

  socket.on('game:action_result',({action,ok,err,tower,player})=>{
    if(!ok){
      const msgs={no_gold:'Nicht genug Gold! 💰',blocks_path:'⚠️ Würde Weg sperren!',blocked:'Hier kann nicht gebaut werden!',locked:'Tower noch nicht freigeschaltet!',not_owner:'Dies ist ein fremder Tower! 🤝'};
      if(err!=='wave_active')toast(msgs[err]||err);
      return;
    }
    if(action==='place_tower'){cancelPick();}
    if(action==='start_wave'){
      document.getElementById('btn-wave').disabled=true;
      document.getElementById('btn-wave').textContent=`⚔ Wave ${GS.wave+1}…`;
    }
    if(player){myGold=player.gold||myGold;}
  });
}

//  SPRITES (client-side only for rendering)

const TSPRITES={};
const ESPRITES={};
let grassTex=null, pathTex=null;

function buildTextures(){
  const mk=(cols,extra)=>{
    const tc=document.createElement('canvas');tc.width=TILE;tc.height=TILE;
    const tx=tc.getContext('2d');tx.fillStyle=cols[0];tx.fillRect(0,0,TILE,TILE);
    for(let i=0;i<55;i++){tx.fillStyle=cols[1+Math.floor(Math.random()*(cols.length-1))];
      tx.beginPath();tx.arc(Math.random()*TILE,Math.random()*TILE,Math.random()*2.2+.4,0,Math.PI*2);tx.fill();}
    if(extra)extra(tx);return tc;
  };
  grassTex=mk(['#2d5018','#355e1c','#264814','#3a6820','#2a5216','#4a7828'],(tx)=>{
    tx.strokeStyle='rgba(80,140,40,.28)';tx.lineWidth=.8;
    for(let i=0;i<8;i++){const px=Math.random()*TILE,py=Math.random()*TILE;
      tx.beginPath();tx.moveTo(px,py);tx.lineTo(px+(Math.random()-.5)*4,py-3-Math.random()*4);tx.stroke();}});
  pathTex=mk(['#1e3a0e','#233e10','#1a3008','#2a4814'],null);
  Object.keys(TSPRITES).forEach(k=>delete TSPRITES[k]);
  Object.keys(ESPRITES).forEach(k=>delete ESPRITES[k]);
}

function getTSpr(type,paths){
  const key=`${type}_${paths.join('')}`;
  if(!TSPRITES[key]){
    const oc=document.createElement('canvas');oc.width=TILE;oc.height=TILE;
    drawTowerSprite(oc,type,paths,TILE);TSPRITES[key]=oc;
  }
  return TSPRITES[key];
}

function getESpr(type,armorPhys,armorMagic,szF){
  const ap=Math.round(armorPhys*10)/10,am=Math.round(armorMagic*10)/10;
  const key=`${type}_${ap}_${am}`;
  if(ESPRITES[key])return ESPRITES[key];
  const sz=Math.round(szF*TILE*2.6)+4;
  const oc=document.createElement('canvas');oc.width=sz;oc.height=sz;
  const x=oc.getContext('2d');const cx=sz/2,cy=sz*.48,r=sz*.40;
  const cfg={
    basic:{body:'#b02810',hi:'#e03020',eye:'#ffe090',shape:'circle'},
    fast:{body:'#b09010',hi:'#e0c020',eye:'#ffffc0',shape:'circle'},
    armored:{body:'#406888',hi:'#5088b0',eye:'#c0e8ff',shape:'square'},
    healer:{body:'#108840',hi:'#20b858',eye:'#90ffc0',shape:'circle'},
    boss:{body:'#600880',hi:'#8010b0',eye:'#e080ff',shape:'diamond'},
    air_light:{body:'#b09020',hi:'#e0c040',eye:'#ffffc0',shape:'circle'},
    air_heavy:{body:'#7020a0',hi:'#9030c0',eye:'#e080ff',shape:'circle'},
  }[type]||{body:'#802020',hi:'#b02020',eye:'#fff0a0',shape:'circle'};
  x.fillStyle='rgba(0,0,0,.25)';x.beginPath();x.ellipse(cx,cy+r+sz*.05,r*.6,r*.18,0,0,Math.PI*2);x.fill();
  if(cfg.shape==='square'){
    const gr=x.createLinearGradient(cx-r,cy-r,cx+r,cy+r);gr.addColorStop(0,cfg.hi);gr.addColorStop(1,cfg.body);
    x.fillStyle=gr;x.fillRect(cx-r*.8,cy-r*.85,r*1.6,r*1.7);
    x.strokeStyle='rgba(0,0,0,.4)';x.lineWidth=1.5;x.strokeRect(cx-r*.8,cy-r*.85,r*1.6,r*1.7);
  }else if(type==='boss'){
    const gr=x.createRadialGradient(cx,cy,sz*.04,cx,cy,r*1.1);gr.addColorStop(0,cfg.hi);gr.addColorStop(1,cfg.body);
    x.fillStyle=gr;x.beginPath();x.moveTo(cx,cy-r);x.lineTo(cx+r*.85,cy);x.lineTo(cx,cy+r*.8);x.lineTo(cx-r*.85,cy);x.closePath();x.fill();
    x.strokeStyle='rgba(0,0,0,.5)';x.lineWidth=1.5;x.stroke();
  }else{
    const gr=x.createRadialGradient(cx-r*.2,cy-r*.2,r*.05,cx,cy,r);gr.addColorStop(0,cfg.hi);gr.addColorStop(1,cfg.body);
    x.fillStyle=gr;x.beginPath();x.arc(cx,cy,r,0,Math.PI*2);x.fill();
    x.strokeStyle='rgba(0,0,0,.45)';x.lineWidth=1.5;x.stroke();
    if(type==='healer'){x.fillStyle='rgba(255,255,255,.45)';x.fillRect(cx-sz*.04,cy-sz*.2,sz*.08,sz*.4);x.fillRect(cx-sz*.18,cy-sz*.04,sz*.36,sz*.08);}
    if(type==='fast'){x.strokeStyle='rgba(255,240,80,.5)';x.lineWidth=1.5;[[-r*.7,-r*.25],[-r*.8,0],[-r*.7,r*.25]].forEach(([ox,oy])=>{x.beginPath();x.moveTo(cx+ox,cy+oy);x.lineTo(cx+ox-sz*.1,cy+oy);x.stroke();});}
    if(type==='air_light'||type==='air_heavy'){
      const wc=type==='air_light'?'rgba(255,230,100,.5)':'rgba(180,100,220,.5)';x.fillStyle=wc;
      x.beginPath();x.moveTo(cx,cy-r*.2);x.quadraticCurveTo(cx-r*1.4,cy-r*.8,cx-r*.3,cy+r*.1);x.closePath();x.fill();
      x.beginPath();x.moveTo(cx,cy-r*.2);x.quadraticCurveTo(cx+r*1.4,cy-r*.8,cx+r*.3,cy+r*.1);x.closePath();x.fill();
    }
  }
  const eyeY=cfg.shape==='square'?cy-r*.1:cy-r*.05;
  [[-r*.28,eyeY],[r*.28,eyeY]].forEach(([ex,ey])=>{
    x.fillStyle='#0a0806';x.beginPath();x.arc(cx+ex,ey,r*.15,0,Math.PI*2);x.fill();
    x.fillStyle=cfg.eye;x.beginPath();x.arc(cx+ex-r*.05,ey-r*.05,r*.08,0,Math.PI*2);x.fill();
  });
  if(armorPhys>0.1){x.strokeStyle=`rgba(220,180,40,${Math.min(.85,armorPhys*1.1)})`;x.lineWidth=2;x.beginPath();x.arc(cx,cy,r+2.5,0,Math.PI*2);x.stroke();}
  if(armorMagic>0.1){x.strokeStyle=`rgba(80,140,255,${Math.min(.85,armorMagic*1.2)})`;x.lineWidth=2;x.beginPath();x.arc(cx,cy,r+4.5,0,Math.PI*2);x.stroke();}
  ESPRITES[key]=oc;return oc;
}

function drawTowerSprite(oc,type,paths,sz){
  sz=sz||oc.width;oc.width=sz;oc.height=sz;
  const x=oc.getContext('2d');x.clearRect(0,0,sz,sz);
  const h=sz/2,q=sz/4;
  const totalLvl=paths.reduce((s,v)=>s+v,0);
  x.fillStyle='rgba(0,0,0,.2)';x.beginPath();x.ellipse(h,sz*.9,sz*.38,sz*.1,0,0,Math.PI*2);x.fill();
  function stone(lx,ty,bw,bh,c1,c2,c3){
    x.fillStyle=c2;x.fillRect(lx,ty,bw,bh);x.fillStyle=c1;x.fillRect(lx,ty,bw,bh*.3);
    x.fillStyle=c3;x.fillRect(lx+bw-sz*.04,ty,sz*.04,bh);x.strokeStyle='rgba(0,0,0,.2)';x.lineWidth=.6;
    for(const f of[.33,.66]){x.beginPath();x.moveTo(lx,ty+bh*f);x.lineTo(lx+bw,ty+bh*f);x.stroke();}
    x.beginPath();x.moveTo(lx+bw*.5,ty);x.lineTo(lx+bw*.5,ty+bh);x.stroke();}
  function zinn(lx,ty,bw,n,col){const bw2=bw/n,bh=sz*.1;for(let i=0;i<n;i++){x.fillStyle=col;x.fillRect(lx+i*bw2+bw2*.1,ty-bh,bw2*.75,bh);}}
  if(type==='dart'){
    stone(q*.5,h*.45,sz*.75,sz*.52,'#b0a07a','#887860','#504836');zinn(q*.5,h*.45,sz*.75,4,'#a09070');
    x.fillStyle='#4a3820';x.beginPath();x.arc(h,h*.3,sz*.1,0,Math.PI*2);x.fill();
    x.strokeStyle='#7a5830';x.lineWidth=sz*.035;x.beginPath();x.arc(h+sz*.08,h*.42,sz*.11,Math.PI*.7,Math.PI*1.3);x.stroke();
    x.strokeStyle='#c8a060';x.lineWidth=sz*.02;x.beginPath();x.moveTo(h-sz*.08,h*.42);x.lineTo(h+sz*.08,h*.42);x.stroke();
    x.fillStyle='#c02020';x.beginPath();x.moveTo(sz*.72,h*.3);x.lineTo(sz*.72+sz*.1,h*.36);x.lineTo(sz*.72,h*.42);x.closePath();x.fill();
  }else if(type==='poison'){
    stone(q*.6,h*.5,sz*.7,sz*.48,'#7a907a','#5a7060','#3a5040');zinn(q*.6,h*.5,sz*.7,3,'#6a8070');
    x.fillStyle='#1a1208';x.beginPath();x.ellipse(h,h*.44,sz*.19,sz*.09,0,0,Math.PI*2);x.fill();
    x.fillStyle='#28c028';x.beginPath();x.ellipse(h,h*.41,sz*.14,sz*.06,0,0,Math.PI*2);x.fill();
    [[h-sz*.06,h*.31,sz*.035],[h+sz*.05,h*.27,sz*.03],[h,h*.22,sz*.025]].forEach(([bx,by,br])=>{x.fillStyle='rgba(50,230,50,.75)';x.beginPath();x.arc(bx,by,br,0,Math.PI*2);x.fill();});
    x.font=`${sz*.18}px serif`;x.textAlign='center';x.textBaseline='middle';x.fillStyle='#60e050';x.fillText('☠',h,h*.72);
  }else if(type==='splash'){
    stone(q*.3,h*.35,sz*.85,sz*.6,'#909090','#686868','#484848');zinn(q*.3,h*.35,sz*.85,5,'#787878');
    x.fillStyle='#282828';x.beginPath();x.roundRect&&x.roundRect(h*.35,h*.6,sz*.52,sz*.18,sz*.03)||x.fillRect(h*.35,h*.6,sz*.52,sz*.18);x.fill();
    x.fillStyle='#181818';x.beginPath();x.arc(h*.35+sz*.52,h*.69,sz*.09,0,Math.PI*2);x.fill();
    [[q*.52,h*.5],[q*.52,h*.62],[q*.42,h*.56]].forEach(([bx,by])=>{x.fillStyle='#303030';x.beginPath();x.arc(bx,by,sz*.06,0,Math.PI*2);x.fill();});
  }else if(type==='lightning'){
    stone(q*.7,h*.55,sz*.6,sz*.42,'#6070a0','#404888','#282e58');zinn(q*.7,h*.55,sz*.6,3,'#505890');
    x.fillStyle='#484888';x.beginPath();x.moveTo(h,sz*.07);x.lineTo(h+sz*.13,h*.55);x.lineTo(h-sz*.13,h*.55);x.closePath();x.fill();
    const og=x.createRadialGradient(h,h*.22,1,h,h*.22,sz*.12);og.addColorStop(0,'#ffffff');og.addColorStop(.4,'#ffe860');og.addColorStop(1,'rgba(255,200,30,0)');
    x.fillStyle=og;x.beginPath();x.arc(h,h*.22,sz*.12,0,Math.PI*2);x.fill();
    x.strokeStyle='rgba(255,238,60,.9)';x.lineWidth=1.5;[[-sz*.16,sz*.16],[sz*.16,sz*.16],[0,sz*.2]].forEach(([dx,dy])=>{x.beginPath();x.moveTo(h,h*.22);x.lineTo(h+dx,h*.22+dy);x.stroke();});
  }else if(type==='frost'){
    stone(q*.6,h*.45,sz*.7,sz*.52,'#80c0d8','#4888a8','#2a5878');zinn(q*.6,h*.45,sz*.7,4,'#68a8c8');
    x.fillStyle='rgba(180,240,255,.9)';x.beginPath();x.moveTo(h,sz*.08);x.lineTo(h+sz*.12,h*.45);x.lineTo(h-sz*.12,h*.45);x.closePath();x.fill();
    x.strokeStyle='rgba(200,240,255,.8)';x.lineWidth=1;for(let i=0;i<6;i++){const a=i*Math.PI/3;x.beginPath();x.moveTo(h,h*.72);x.lineTo(h+Math.cos(a)*sz*.1,h*.72+Math.sin(a)*sz*.1);x.stroke();}
  }
  {const cols3=['#60c0ff','#50e040','#ffa030'];
  paths.forEach((lvl,pi)=>{for(let i=0;i<5;i++){
    const px=sz*.14+i*sz*.17,py=sz*.88+pi*sz*.04;
    x.beginPath();x.arc(px,py,1.6,0,Math.PI*2);
    x.fillStyle=i<lvl?(cols3[pi]||'#f0e050'):'rgba(255,255,255,.14)';x.fill();
  }});}
}

// ═══════════════════════════════════════════════════════
//  INTERPOLATION
// ═══════════════════════════════════════════════════════
function lerp(a,b,t){return a+(b-a)*t;}

// Get interpolated enemy/bullet positions between prev and current snapshot
function getAlpha(){
  if(!prevGS||snapTime===0)return 1;
  const elapsed=performance.now()-snapTime;
  return Math.min(1, elapsed/snapInterval);
}

function interpEnemies(){
  if(!prevGS||!prevGS.enemies)return GS.enemies;
  const alpha=getAlpha();
  if(alpha>=1)return GS.enemies;
  const prevMap={};
  prevGS.enemies.forEach(e=>prevMap[e.id]=e);
  return GS.enemies.map(e=>{
    const p=prevMap[e.id];
    if(!p)return e;
    return{...e, px:lerp(p.px,e.px,alpha), py:lerp(p.py,e.py,alpha)};
  });
}

function interpBullets(){
  if(!prevGS||!prevGS.bullets)return GS.bullets;
  const alpha=getAlpha();
  if(alpha>=1)return GS.bullets;
  const prevMap={};
  prevGS.bullets.forEach(b=>prevMap[b.id]=b);
  return GS.bullets.map(b=>{
    const p=prevMap[b.id];
    if(!p)return b;
    return{...b, x:lerp(p.x,b.x,alpha), y:lerp(p.y,b.y,alpha)};
  });
}

// ═══════════════════════════════════════════════════════
//  COORDINATE SCALING
//  Server engine uses TILE=32. Client TILE varies by screen size.
//  All server pixel positions must be scaled to client pixels.
// ═══════════════════════════════════════════════════════
const SRV_TILE=32;
function sc(v){return v*(TILE/SRV_TILE);} // scale server→client

// ═══════════════════════════════════════════════════════
//  RENDERING
// ═══════════════════════════════════════════════════════
const canvas=document.getElementById('gc');
const ctx=canvas.getContext('2d');

function render(){
  const land=getOrient()==='landscape';
  if(land){ctx.clearRect(0,0,CH,CW);}else{ctx.clearRect(0,0,CW,CH);}
  drawMap();drawFireZones();drawHover();drawTowers();
  drawBolts();drawBullets();drawParticles();drawEnemies();
}

function drawMap(){
  if(!grassTex||!pathTex||!TILE)return;
  const gP=ctx.createPattern(grassTex,'repeat'),pP=ctx.createPattern(pathTex,'repeat');
  for(let r=0;r<ROWS;r++)for(let c=0;c<COLS;c++){
    ctx.fillStyle=GS.pathSet.has(`${r},${c}`)?pP:gP;
    ctx.fillRect(gcx(c,r),gcy(c,r),TILE,TILE);
  }
  ctx.strokeStyle='rgba(0,0,0,.09)';ctx.lineWidth=.35;
  const land=getOrient()==='landscape';
  const _W=land?CH:CW,_H=land?CW:CH;
  for(let r=0;r<=ROWS;r++){const _p=r*TILE;ctx.beginPath();if(land){ctx.moveTo(_p,0);ctx.lineTo(_p,_H);}else{ctx.moveTo(0,_p);ctx.lineTo(_W,_p);}ctx.stroke();}
  for(let c=0;c<=COLS;c++){const _p=c*TILE;ctx.beginPath();if(land){ctx.moveTo(0,_p);ctx.lineTo(_W,_p);}else{ctx.moveTo(_p,0);ctx.lineTo(_p,_H);}ctx.stroke();}
  // Start portal
  const ex=gx(ENTRY_COL*TILE+TILE/2,TILE/2),ey=gy(ENTRY_COL*TILE+TILE/2,TILE/2);
  const eg=ctx.createRadialGradient(ex,ey,1,ex,ey,TILE*.8);
  eg.addColorStop(0,'rgba(80,255,80,.65)');eg.addColorStop(.5,'rgba(40,200,40,.28)');eg.addColorStop(1,'rgba(0,100,0,0)');
  ctx.fillStyle=eg;ctx.beginPath();ctx.arc(ex,ey,TILE*.8,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#50ff70';ctx.font=`bold ${Math.max(10,TILE*.46)}px serif`;
  ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.shadowColor='#40ff60';ctx.shadowBlur=12;ctx.fillText(land?'▶':'▼',ex,ey);ctx.shadowBlur=0;
  ctx.font=`bold ${Math.max(7,TILE*.23)}px Cinzel,serif`;ctx.fillStyle='rgba(100,255,120,.9)';
  ctx.fillText('START',ex,ey+TILE*.56);
  // Exit portal
  const EXIT_ROW=ROWS-1;
  const xr=gx(ENTRY_COL*TILE+TILE/2,EXIT_ROW*TILE+TILE/2),yr=gy(ENTRY_COL*TILE+TILE/2,EXIT_ROW*TILE+TILE/2);
  const xg=ctx.createRadialGradient(xr,yr,1,xr,yr,TILE*.8);
  xg.addColorStop(0,'rgba(255,80,60,.65)');xg.addColorStop(.5,'rgba(200,40,30,.28)');xg.addColorStop(1,'rgba(100,0,0,0)');
  ctx.fillStyle=xg;ctx.beginPath();ctx.arc(xr,yr,TILE*.8,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#ff6050';ctx.font=`bold ${Math.max(10,TILE*.46)}px serif`;
  ctx.shadowColor='#ff4040';ctx.shadowBlur=12;ctx.fillText(land?'◀':'▲',xr,yr);ctx.shadowBlur=0;
  ctx.font=`bold ${Math.max(7,TILE*.23)}px Cinzel,serif`;ctx.fillStyle='rgba(255,100,90,.9)';
  ctx.fillText('ZIEL',xr,yr-TILE*.56);
}

function drawFireZones(){
  const t=GS.gameTime;
  for(const f of GS.fireZones){
    const rem=(f.until-t)/(f.dur);
    const fl=0.6+0.4*Math.sin(t*0.015);
    ctx.beginPath();ctx.arc(gx(sc(f.x),sc(f.y)),gy(sc(f.x),sc(f.y)),sc(f.r),0,Math.PI*2);
    ctx.fillStyle=`rgba(255,80,20,${rem*0.22*fl})`;ctx.fill();
    ctx.strokeStyle=`rgba(255,140,50,${rem*0.55})`;ctx.lineWidth=2;ctx.stroke();
  }
}

function drawHover(){
  if(!pickedType||!hoverCell)return;
  const{r,c}=hoverCell;
  const myTower=GS.towers.find(t=>(r===t.row||r===t.row+1)&&(c===t.col||c===t.col+1));
  const blocked=!!myTower||r<0||r+1>=ROWS||c<0||c+1>=COLS;
  const ok=!blocked&&myGold>=TDB[pickedType].cost;
  ctx.fillStyle=ok?'rgba(120,255,80,.18)':'rgba(255,60,60,.22)';
  ctx.fillRect(gcx(c,r),gcy(c,r),TILE*2,TILE*2);
  ctx.globalAlpha=0.5;
  ctx.drawImage(getTSpr(pickedType,[0,0,0]),gcx(c,r),gcy(c,r),TILE*2,TILE*2);
  ctx.globalAlpha=1;
  const cx2=gcx(c,r)+TILE,cy2=gcy(c,r)+TILE,rng=TDB[pickedType].baseRange*TILE;
  ctx.beginPath();ctx.arc(cx2,cy2,rng,0,Math.PI*2);
  ctx.strokeStyle=ok?'rgba(120,255,80,.38)':'rgba(255,60,60,.38)';ctx.lineWidth=1.5;
  ctx.setLineDash([4,3]);ctx.stroke();ctx.setLineDash([]);
}

const PLAYER_COLORS=['#4af','#f84','#4f8','#f4f','#ff4','#4ff'];
function getOwnerColor(ownerId){
  const ids=Object.keys(GS.players||{});
  const idx=ids.indexOf(String(ownerId));
  if(ownerId===myUserId)return PLAYER_COLORS[0];
  return PLAYER_COLORS[(idx+1)%PLAYER_COLORS.length];
}

function drawTowers(){
  for(const t of GS.towers){
    const isSel=selTower&&selTower.id===t.id;
    const cx2=gcx(t.col,t.row)+TILE,cy2=gcy(t.col,t.row)+TILE;
    if(isSel){
      ctx.fillStyle='rgba(255,220,60,.1)';ctx.fillRect(gcx(t.col,t.row),gcy(t.col,t.row),TILE*2,TILE*2);
      const rng=(TDB[t.type]?.baseRange||3)*TILE;
      ctx.beginPath();ctx.arc(cx2,cy2,rng,0,Math.PI*2);
      ctx.strokeStyle='rgba(255,240,150,.32)';ctx.lineWidth=1.5;ctx.setLineDash([5,4]);ctx.stroke();ctx.setLineDash([]);
    }
    ctx.drawImage(getTSpr(t.type,t.paths),gcx(t.col,t.row),gcy(t.col,t.row),TILE*2,TILE*2);
    // Owner dot
    if(Object.keys(GS.players||{}).length>1){
      ctx.fillStyle=getOwnerColor(t.owner);
      ctx.beginPath();ctx.arc(gcx(t.col,t.row)+7,gcy(t.col,t.row)+7,5,0,Math.PI*2);ctx.fill();
      ctx.strokeStyle='rgba(0,0,0,.6)';ctx.lineWidth=1;ctx.stroke();
    }
    // Cooldown arc
    const pct=Math.min((GS.gameTime-t.lastFire)/t.cd,1);
    if(pct<1){
      ctx.beginPath();ctx.arc(cx2,cy2,TILE*.8,-Math.PI/2,-Math.PI/2+pct*Math.PI*2);
      ctx.strokeStyle='rgba(255,255,80,.5)';ctx.lineWidth=3;ctx.stroke();
    }
  }
}

function drawEnemies(){
  for(const e of interpEnemies()){
    const px=gx(sc(e.px),sc(e.py)),py=gy(sc(e.px),sc(e.py));
    const spr=getESpr(e.type,e.armorPhys,e.armorMagic,e.szF);
    const sz=spr.width;
    if(e.poison){ctx.beginPath();ctx.arc(px,py,sz*.52+2,0,Math.PI*2);ctx.strokeStyle='rgba(50,210,30,.7)';ctx.lineWidth=2;ctx.stroke();}
    if(e.slow)  {ctx.beginPath();ctx.arc(px,py,sz*.52+4,0,Math.PI*2);ctx.strokeStyle='rgba(80,200,255,.7)';ctx.lineWidth=2;ctx.stroke();}
    if(e.fire)  {ctx.beginPath();ctx.arc(px,py,sz*.52+3,0,Math.PI*2);ctx.strokeStyle='rgba(255,120,30,.7)';ctx.lineWidth=2;ctx.stroke();}
    ctx.drawImage(spr,px-sz/2,py-sz/2);
    const bw=sz*.85,bh=Math.max(3,TILE*.09),bx=px-bw/2,by=py-sz/2-bh-2;
    ctx.fillStyle='#280808';ctx.fillRect(bx,by,bw,bh);
    const f=e.hp/e.maxHp;ctx.fillStyle=f>.6?'#38e038':f>.3?'#e0c028':'#e02828';ctx.fillRect(bx,by,bw*f,bh);
  }
}

function drawBullets(){
  for(const b of interpBullets()){
    const bx=gx(sc(b.x),sc(b.y)),by=gy(sc(b.x),sc(b.y));
    const r=b.kind==='bomb'?TILE*.16:TILE*.1;
    const col={bomb:'#ff7820',poison:'#55e040',frost:'#70e8ff',dart:'#aad8ff'}[b.kind]||'#aad8ff';
    ctx.beginPath();ctx.arc(bx,by,r,0,Math.PI*2);ctx.fillStyle=col;ctx.fill();
    ctx.beginPath();ctx.arc(bx,by,r*1.9,0,Math.PI*2);
    ctx.fillStyle={bomb:'rgba(255,120,30,.2)',poison:'rgba(80,240,40,.15)',frost:'rgba(100,200,255,.15)',dart:'rgba(150,210,255,.12)'}[b.kind]||'rgba(150,210,255,.12)';
    ctx.fill();
  }
}

function drawBolts(){
  for(const bolt of GS.bolts){
    const a=bolt.life/bolt.maxLife;
    ctx.save();ctx.shadowColor='#ffe040';ctx.shadowBlur=12*a;
    ctx.strokeStyle=`rgba(255,238,60,${a})`;ctx.lineWidth=a*2.5+.5;
    const segs=7;
    const sbx1=sc(bolt.x1),sby1=sc(bolt.y1),sbx2=sc(bolt.x2),sby2=sc(bolt.y2);
    const dx=(sbx2-sbx1)/segs,dy=(sby2-sby1)/segs;
    ctx.beginPath();ctx.moveTo(gx(sbx1,sby1),gy(sbx1,sby1));
    for(let i=1;i<segs;i++)ctx.lineTo(gx(sbx1+dx*i+(Math.random()-.5)*8,sby1+dy*i+(Math.random()-.5)*8),gy(sbx1+dx*i+(Math.random()-.5)*8,sby1+dy*i+(Math.random()-.5)*8));
    ctx.lineTo(gx(sbx2,sby2),gy(sbx2,sby2));ctx.stroke();ctx.restore();
  }
}

function drawParticles(){
  for(const p of GS.particles){
    const a=p.life/p.maxLife;
    ctx.beginPath();ctx.arc(gx(sc(p.x),sc(p.y)),gy(sc(p.x),sc(p.y)),p.r*a,0,Math.PI*2);
    const r2=parseInt(p.col.slice(1,3),16),g2=parseInt(p.col.slice(3,5),16),b2=parseInt(p.col.slice(5,7),16);
    ctx.fillStyle=`rgba(${r2},${g2},${b2},${a.toFixed(2)})`;ctx.fill();
  }
}

// ═══════════════════════════════════════════════════════
//  UI / INPUT
// ═══════════════════════════════════════════════════════
function updateHUD(){
  const me=GS.players[myUserId];
  document.getElementById('v-lives').textContent=GS.sharedLives??50;
  document.getElementById('v-gold').textContent=myGold;
  document.getElementById('v-score').textContent=myScore;
  document.getElementById('v-kills').textContent=myKills;
  document.getElementById('wbadge').textContent=`Wave ${GS.wave}/25`;
}

function refreshTwrBtns(){
  for(const[k,b]of Object.entries(TDB)){
    const el=document.getElementById('btn-'+k);if(!el)continue;
    if(b.unlock&&GS.wave<b.unlock)continue;
    if(pickedType===k){el.disabled=false;continue;}
    el.disabled=myGold<b.cost;
  }
}

function cellFromXY(clientX,clientY){
  const rect=canvas.getBoundingClientRect();
  const lx=clientX-rect.left,ly=clientY-rect.top;
  if(getOrient()==='landscape'){
    const scx=CH/rect.width,scy=CW/rect.height;
    return{r:Math.floor(lx*scx/TILE),c:Math.floor(ly*scy/TILE)};
  }
  const scx=CW/rect.width,scy=CH/rect.height;
  return{r:Math.floor(ly*scy/TILE),c:Math.floor(lx*scx/TILE)};
}

canvas.addEventListener('mousemove',e=>{hoverCell=cellFromXY(e.clientX,e.clientY);});
canvas.addEventListener('mouseleave',()=>{hoverCell=null;});
canvas.addEventListener('click',e=>{
  if(GS.gameOver)return;
  const{r,c}=cellFromXY(e.clientX,e.clientY);
  handleTap(r,c);
});
canvas.addEventListener('touchmove',e=>e.preventDefault(),{passive:false});
canvas.addEventListener('touchstart',e=>{e.preventDefault();hoverCell=cellFromXY(e.touches[0].clientX,e.touches[0].clientY);},{passive:false});
canvas.addEventListener('touchend',e=>{
  e.preventDefault();if(GS.gameOver)return;
  const t=e.changedTouches[0];handleTap(...Object.values(cellFromXY(t.clientX,t.clientY)));hoverCell=null;
});

function handleTap(r,c){
  if(pickedType){
    sendAction('place_tower',{type:pickedType,row:r,col:c});
    return;
  }
  const t=GS.towers.find(t=>(r===t.row||r===t.row+1)&&(c===t.col||c===t.col+1));
  if(t){
    if(t.owner!==myUserId&&Object.keys(GS.players||{}).length>1){toast('Dies ist ein fremder Tower! 🤝');return;}
    if(selTower&&selTower.id===t.id)closeSheet();else showSheet(t);
  }else closeSheet();
}

document.getElementById('sh-handle').addEventListener('click',closeSheet);
document.addEventListener('keydown',e=>{
  if(e.key===' '){e.preventDefault();startWave();}
  if(e.key==='Escape'){cancelPick();closeSheet();}
  if(e.key==='f'||e.key==='F')toggleSpd();
  ['1','2','3','4','5'].forEach((k,i)=>{if(e.key===k)pickTower(['dart','poison','splash','lightning','frost'][i]);});
});

function sendAction(action,data={}){
  if(!socket||!sessionId){toast('Nicht verbunden!');return;}
  socket.emit('game:action',{sessionId,action,data});
}

function startWave(){
  if(GS.waveActive||GS.gameOver||GS.wave>=25)return;
  sendAction('start_wave');
}

function pickTower(type){
  const b=TDB[type];
  if(b.unlock&&GS.wave<b.unlock){toast(`🔒 Ab Wave ${b.unlock}!`);return;}
  if(pickedType===type){cancelPick();return;}
  if(myGold<b.cost){toast('Nicht genug Gold! 💰');return;}
  pickedType=type;selTower=null;closeSheet();
  document.querySelectorAll('.twrb').forEach(el=>el.classList.remove('sel'));
  document.getElementById('btn-'+type).classList.add('sel');
}

function cancelPick(){
  pickedType=null;document.querySelectorAll('.twrb').forEach(el=>el.classList.remove('sel'));
}

function toggleSpd(){
  speedMult=speedMult===1?2:1;
  document.getElementById('spd-lbl').textContent=speedMult===1?'1×':'2×';
  document.getElementById('btn-spd').classList.toggle('fast',speedMult===2);
}

function showSheet(t){
  selTower=t;
  const b=TDB[t.type];
  drawTowerSprite(document.getElementById('sh-canvas'),t.type,t.paths,52);
  document.getElementById('sh-name').textContent=b.name;
  document.getElementById('sh-lvl').textContent=`${t.paths.reduce((a,v)=>a+v,0)}/15 Upgrades`;
  document.getElementById('sh-dmg').textContent=b.baseDmg;
  document.getElementById('sh-rng').textContent=b.baseRange.toFixed(1)+'T';
  document.getElementById('sh-fps').textContent=(1000/b.baseCd).toFixed(1)+'/s';
  let html='';
  b.paths.forEach((path,pi)=>{
    const lvl=t.paths[pi],maxed=lvl>=5;
    const dots='●'.repeat(lvl)+'○'.repeat(5-lvl);
    const cost=getUpgradeCost(t,pi);
    const u=maxed?null:path.upgrades[lvl];
    const baseCost=u?u.cost:0;
    const penalty=cost&&baseCost?Math.round(cost/baseCost*100)-100:0;
    const canAfford=!maxed&&myGold>=(cost||0);
    html+=`<div class="path-section"><div class="path-hdr"><span class="path-ic">${path.icon}</span><span class="path-nm">${path.name}</span><span class="path-dots">${dots}</span></div>
    <button class="path-btn${maxed?' maxed':''}" onclick="doUpgradePath(${pi})" ${(!canAfford||maxed)?'disabled':''}>
      ${maxed?'✅ MAX LEVEL':`⬆ Stufe ${lvl+1}: ${u.desc} — <b>${cost}g</b>${penalty>0?` <span class="path-penalty">(+${penalty}%)</span>`:''}`}
    </button></div>`;
  });
  document.getElementById('sh-paths').innerHTML=html;
  document.getElementById('sh-sell-val').textContent=`+${Math.floor(t.invested*.6)}g`;
  document.getElementById('sheet').classList.add('open');
}

function closeSheet(){selTower=null;document.getElementById('sheet').classList.remove('open');}

function doUpgradePath(pi){
  if(!selTower)return;
  sendAction('upgrade_path',{towerId:selTower.id,pi});
  // Update local copy for UI refresh
  setTimeout(()=>{
    const t=GS.towers.find(t=>t.id===selTower?.id);
    if(t)showSheet(t);
  },100);
}

function doSell(){
  if(!selTower)return;
  sendAction('sell_tower',{towerId:selTower.id});
  selTower=null;closeSheet();
}

let _toastT=null;
function toast(msg,err=true){
  const el=document.getElementById('toast');
  el.innerHTML=msg;
  el.style.background=err?'rgba(180,40,20,.92)':'rgba(20,110,20,.92)';
  el.style.border=err?'1px solid #a02010':'1px solid #105010';
  el.style.color=err?'#ffb0a0':'#a0ffb0';
  el.classList.remove('on');void el.offsetWidth;el.classList.add('on');
  clearTimeout(_toastT);_toastT=setTimeout(()=>el.classList.remove('on'),3000);
}

function hideDiffScreen(){
  document.getElementById('diff-screen').style.display='none';
}
function showDiffScreen(){
  document.getElementById('gameover').classList.remove('on');
  document.getElementById('diff-screen').style.display='flex';
}

function startDiff(diff){
  hideDiffScreen();
  const sess=JSON.parse(sessionStorage.getItem('mp_session')||'null');
  if(sess&&sess.solo&&socket){
    // Solo: start the server game with selected difficulty now
    socket.emit('game:solo_start',{difficulty:diff});
  }
  // MP: game already running, nothing to do (diff set in lobby)
}

// ═══════════════════════════════════════════════════════
//  MAIN LOOP (render only)
// ═══════════════════════════════════════════════════════
function loop(){
  requestAnimationFrame(loop);
  render();
}

// ═══════════════════════════════════════════════════════
//  BOOT
// ═══════════════════════════════════════════════════════
(function boot(){
  const sess=JSON.parse(sessionStorage.getItem('mp_session')||'null');
  const fromPlatform=sess&&!sess.solo;
  const isSolo=sess&&sess.solo;

  // Set initial orientation from screen
  ORIENT=(window.innerWidth>=window.innerHeight)?'landscape':'portrait';
  const icons={portrait:'📱',landscape:'🖥️'};
  document.getElementById('btn-orient').textContent=icons[ORIENT];

  function doInit(){
    const wrap=document.getElementById('canvaswrap');
    if(!wrap||wrap.clientWidth===0)return;
    applyLayout();
    // Draw initial button sprites
    ['dart','poison','splash','lightning','frost'].forEach(type=>{
      const el=document.getElementById('tc-'+type);
      if(el)drawTowerSprite(el,type,[0,0,0],24);
    });
    connectSocket();
    requestAnimationFrame(loop);
    // Auto-start from platform
    if(fromPlatform){
      hideDiffScreen();
    }
  }

  const wrap=document.getElementById('canvaswrap');
  if(wrap&&window.ResizeObserver){
    const ro=new ResizeObserver(()=>{doInit();ro.disconnect();});
    ro.observe(wrap);
  }
  window.addEventListener('load',()=>{doInit();setTimeout(doInit,100);});
  window.addEventListener('resize',()=>{
    applyLayout();
  });
})();
</script>
