name: Wear OS APK Build
# Läuft automatisch bei jedem Push auf main/test — analog zu docker.yml.
# Baut die AR-Ops-Companion-App für Wear OS (apps/arops-wear/) — ein
# eigenständiges natives Kotlin/Gradle-Projekt, KEIN Expo/RN (dafür gibt es
# keinen Wear-OS-Support). Läuft nie standalone: Companion-App, die den
# Spielstand vom gekoppelten Handy über die Data-Layer-API empfängt — hat
# deshalb (anders als die Handy-App) keinen eigenen Backend-Endpoint und
# damit keine Channel-Unterscheidung nötig.
on:
  push:
    branches: [main, test]
jobs:
  gradle-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.9'

      - name: Debug-APK bauen
        working-directory: apps/arops-wear
        run: gradle :app:assembleDebug --no-daemon

      - name: APK umbenennen (ar-ops-wear-beta-v<Version>.apk)
        working-directory: apps/arops-wear
        run: |
          VERSION=$(grep -oP 'versionName\s*=\s*"\K[^"]+' app/build.gradle.kts)
          FILENAME="ar-ops-wear-beta-v${VERSION}.apk"
          mv app/build/outputs/apk/debug/app-debug.apk "app/build/outputs/apk/debug/$FILENAME"
          echo "APK_FILENAME=$FILENAME" >> "$GITHUB_ENV"

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ env.APK_FILENAME }}
          path: apps/arops-wear/app/build/outputs/apk/debug/${{ env.APK_FILENAME }}
          if-no-files-found: error
