name: Wear OS APK Build
# Auf main läuft der Build immer (Merge auf main = Release, keine Ausnahmen).
# Auf test nur bei Änderungen an apps/arops-wear/ selbst (kein Bezug zum
# shared Package, rein natives Kotlin/Gradle-Projekt ohne gemeinsamen Code
# mit der Handy-App). KEIN Expo/RN (dafür gibt es keinen Wear-OS-Support).
# Läuft nie standalone: Companion-App, die den Spielstand vom gekoppelten
# Handy über die Data-Layer-API empfängt — hat deshalb (anders als die
# Handy-App) keinen eigenen Backend-Endpoint und damit keine
# Channel-Unterscheidung dafür nötig.
#
# APP_CHANNEL bestimmt trotzdem applicationId + Label (analog zur Handy-App,
# siehe app/build.gradle.kts): main = one.srz.aropswear ("AR Ops Radar"),
# test = one.srz.aropswear.beta ("AR Ops Radar Beta") — damit beide
# gleichzeitig auf derselben Uhr installiert sein können. assembleRelease
# (nicht assembleDebug): signiert über AGP's Standard-Debug-Keystore (siehe
# signingConfigs in build.gradle.kts), für Sideload/internes Testen
# ausreichend, wie bei der Handy-App. APK-Dateiname ist bewusst FEST (main:
# ar-ops-wear.apk, test: ar-ops-wear-beta.apk) statt versioniert — siehe
# apk.yml's ausführlicher Kommentar dazu: ein Versions-Bump hätte sonst
# einen neuen Dateinamen erzeugt, den `gh release upload --clobber` unten
# nicht ersetzt, sondern als zusätzliches Asset stehen lässt. Fester Name =
# jeder Build ersetzt zuverlässig genau die eine Datei pro Branch.
on:
  push:
    branches: [main, test]
jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      run: ${{ steps.check.outputs.run }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - id: check
        run: |
          if [ "$GITHUB_REF_NAME" = "main" ]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          BEFORE="${{ github.event.before }}"
          if [ -z "$BEFORE" ] || [ "$BEFORE" = "0000000000000000000000000000000000000000" ]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if git diff --name-only "$BEFORE" "${{ github.sha }}" | grep -qE '^(apps/arops-wear/|\.github/workflows/wear-apk\.yml)'; then
            echo "run=true" >> "$GITHUB_OUTPUT"
          else
            echo "run=false" >> "$GITHUB_OUTPUT"
          fi

  gradle-build:
    needs: changes
    if: needs.changes.outputs.run == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.9'

      - name: App-Channel für den Branch setzen
        run: |
          if [ "$GITHUB_REF_NAME" = "main" ]; then
            echo "APP_CHANNEL=main" >> "$GITHUB_ENV"
          else
            echo "APP_CHANNEL=test" >> "$GITHUB_ENV"
          fi
          echo "COMMIT_SHA=${GITHUB_SHA::7}" >> "$GITHUB_ENV"

      - name: Release-APK bauen
        working-directory: apps/arops-wear
        run: gradle :app:assembleRelease --no-daemon

      - name: "APK umbenennen (main: ar-ops-wear.apk, test: ar-ops-wear-beta.apk)"
        working-directory: apps/arops-wear
        run: |
          if [ "$APP_CHANNEL" = "main" ]; then
            FILENAME="ar-ops-wear.apk"
          else
            FILENAME="ar-ops-wear-beta.apk"
          fi
          mv app/build/outputs/apk/release/app-release.apk "app/build/outputs/apk/release/$FILENAME"
          echo "APK_FILENAME=$FILENAME" >> "$GITHUB_ENV"

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ env.APK_FILENAME }}
          path: apps/arops-wear/app/build/outputs/apk/release/${{ env.APK_FILENAME }}
          if-no-files-found: error

      # Siehe apk.yml: Actions-Artifacts sind immer gezippt und laufen ohne
      # CDN, ein Release-Asset lädt spürbar schneller. Feste Tag pro Branch,
      # wird bei jedem Build überschrieben statt neue Releases anzuhäufen.
      - name: Als Release-Asset veröffentlichen (schnellerer Download)
        working-directory: apps/arops-wear
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="apk-wear-${GITHUB_REF_NAME}"
          ASSET="app/build/outputs/apk/release/${{ env.APK_FILENAME }}"
          NOTES="Build ${GITHUB_SHA::7} · $(date -u +'%Y-%m-%d %H:%M UTC') · Branch ${GITHUB_REF_NAME}"
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release upload "$TAG" "$ASSET" --clobber
            gh release edit "$TAG" --notes "$NOTES"
          else
            PRERELEASE_FLAG=""
            [ "$GITHUB_REF_NAME" != "main" ] && PRERELEASE_FLAG="--prerelease"
            gh release create "$TAG" "$ASSET" \
              --title "AR Ops Wear OS (${GITHUB_REF_NAME})" \
              --notes "$NOTES" \
              --target "$GITHUB_SHA" \
              $PRERELEASE_FLAG
          fi
