name: Wear OS APK Build
# Auf main läuft der Build immer (Merge auf main = Release, keine Ausnahmen).
# Auf test nur bei Änderungen an apps/arops-wear/ selbst (kein Bezug zum
# shared Package, rein natives Kotlin/Gradle-Projekt ohne gemeinsamen Code
# mit der Handy-App). KEIN Expo/RN (dafür gibt es keinen Wear-OS-Support).
# Läuft nie standalone: Companion-App, die den Spielstand vom gekoppelten
# Handy über die Data-Layer-API empfängt — hat deshalb (anders als die
# Handy-App) keinen eigenen Backend-Endpoint und damit keine
# Channel-Unterscheidung nötig.
on:
  push:
    branches: [main, test]
jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      run: ${{ steps.check.outputs.run }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - id: check
        run: |
          if [ "$GITHUB_REF_NAME" = "main" ]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          BEFORE="${{ github.event.before }}"
          if [ -z "$BEFORE" ] || [ "$BEFORE" = "0000000000000000000000000000000000000000" ]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if git diff --name-only "$BEFORE" "${{ github.sha }}" | grep -qE '^(apps/arops-wear/|\.github/workflows/wear-apk\.yml)'; then
            echo "run=true" >> "$GITHUB_OUTPUT"
          else
            echo "run=false" >> "$GITHUB_OUTPUT"
          fi

  gradle-build:
    needs: changes
    if: needs.changes.outputs.run == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.9'

      - name: Debug-APK bauen
        working-directory: apps/arops-wear
        run: gradle :app:assembleDebug --no-daemon

      - name: APK umbenennen (ar-ops-wear-beta-v<Version>.apk)
        working-directory: apps/arops-wear
        run: |
          VERSION=$(grep -oP 'versionName\s*=\s*"\K[^"]+' app/build.gradle.kts)
          FILENAME="ar-ops-wear-beta-v${VERSION}.apk"
          mv app/build/outputs/apk/debug/app-debug.apk "app/build/outputs/apk/debug/$FILENAME"
          echo "APK_FILENAME=$FILENAME" >> "$GITHUB_ENV"

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ env.APK_FILENAME }}
          path: apps/arops-wear/app/build/outputs/apk/debug/${{ env.APK_FILENAME }}
          if-no-files-found: error
