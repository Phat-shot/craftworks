name: APK Build
# Auf main läuft der Build immer (Merge auf main = Release, keine Ausnahmen).
# Auf test nur, wenn sich seit dem letzten Push tatsächlich etwas an der App
# oder ihrer einzigen Abhängigkeit (das shared Package, als vendored Tarball
# eingebunden) geändert hat — ein reiner Server-/Doku-Commit soll keinen
# kompletten Android-Build anstoßen. Branch bestimmt den Backend-Endpoint
# (main = arops.srz.one, test = dev.srz.one). Baut lokal in der CI per
# Gradle statt in der EAS-Cloud — kein EAS-Kontingent, kein EXPO_TOKEN-Secret.
#
# assembleRelease, nicht assembleDebug: ein Debug-Build erwartet einen
# laufenden Metro-Dev-Server und fragt beim Start nach dessen URL ("Unable
# to load script", wenn man dort z.B. eine normale Webseiten-URL einträgt —
# das ist kein Metro-Server). Release-Builds bündeln das JS dagegen fest in
# die APK, laufen also eigenständig. Signiert ist das trotzdem nur mit
# Androids Standard-Debug-Keystore (von Expo's prebuild so vorkonfiguriert,
# siehe android/app/build.gradle) — für Sideload/internes Testen
# ausreichend, aber NICHT für einen Play-Store-Release geeignet.
#
# Versionsschema (siehe CLAUDE.md): jedes Release (Merge auf main) +1, jeder
# Bugfix auf test +0.1 — app.json "version" ist die einzige Quelle dafür,
# vor jedem Push von Hand hochzählen.
on:
  push:
    branches: [main, test]
jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      run: ${{ steps.check.outputs.run }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - id: check
        run: |
          if [ "$GITHUB_REF_NAME" = "main" ]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          BEFORE="${{ github.event.before }}"
          if [ -z "$BEFORE" ] || [ "$BEFORE" = "0000000000000000000000000000000000000000" ]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if git diff --name-only "$BEFORE" "${{ github.sha }}" | grep -qE '^(apps/arops-mobile/|packages/arops-shared/|\.github/workflows/apk\.yml)'; then
            echo "run=true" >> "$GITHUB_OUTPUT"
          else
            echo "run=false" >> "$GITHUB_OUTPUT"
          fi

  gradle-build:
    needs: changes
    if: needs.changes.outputs.run == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Install app deps
        working-directory: apps/arops-mobile
        run: npm install --no-audit --no-fund

      - name: Backend-Endpoint für den Branch setzen
        run: |
          if [ "$GITHUB_REF_NAME" = "main" ]; then
            echo "SERVER_URL=https://arops.srz.one" >> "$GITHUB_ENV"
          else
            echo "SERVER_URL=https://dev.srz.one" >> "$GITHUB_ENV"
          fi

      - name: Expo prebuild (generiert das native android/-Projekt)
        working-directory: apps/arops-mobile
        run: npx expo prebuild --platform android --no-install

      - name: Gradle-Wrapper ausführbar machen
        working-directory: apps/arops-mobile/android
        run: chmod +x gradlew

      - uses: gradle/actions/setup-gradle@v4

      - name: Release-APK bauen (JS fest eingebettet, kein Metro nötig)
        working-directory: apps/arops-mobile/android
        run: ./gradlew assembleRelease --no-daemon

      - name: APK umbenennen (ar-ops-android-beta-v<Version>.apk)
        working-directory: apps/arops-mobile
        run: |
          VERSION=$(node -p "require('./app.json').expo.version")
          FILENAME="ar-ops-android-beta-v${VERSION}.apk"
          mv android/app/build/outputs/apk/release/app-release.apk "android/app/build/outputs/apk/release/$FILENAME"
          echo "APK_FILENAME=$FILENAME" >> "$GITHUB_ENV"

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ env.APK_FILENAME }}
          path: apps/arops-mobile/android/app/build/outputs/apk/release/${{ env.APK_FILENAME }}
          if-no-files-found: error

      # Actions-Artifacts sind immer als Zip verpackt und laufen ohne CDN —
      # spürbar langsamer Download als ein Release-Asset (direkt/CDN
      # ausgeliefert, keine Extra-Zip-Schicht). Eine feste Tag pro Branch
      # ("apk-android-test"/"apk-android-main") wird bei jedem Build
      # überschrieben statt neue Releases anzuhäufen — ein Link zum
      # Bookmarken, der immer den neuesten Build zeigt.
      - name: Als Release-Asset veröffentlichen (schnellerer Download)
        working-directory: apps/arops-mobile
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="apk-android-${GITHUB_REF_NAME}"
          ASSET="android/app/build/outputs/apk/release/${{ env.APK_FILENAME }}"
          NOTES="Build ${GITHUB_SHA::7} · $(date -u +'%Y-%m-%d %H:%M UTC') · Branch ${GITHUB_REF_NAME}"
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release upload "$TAG" "$ASSET" --clobber
            gh release edit "$TAG" --notes "$NOTES"
          else
            PRERELEASE_FLAG=""
            [ "$GITHUB_REF_NAME" != "main" ] && PRERELEASE_FLAG="--prerelease"
            gh release create "$TAG" "$ASSET" \
              --title "AR Ops Android (${GITHUB_REF_NAME})" \
              --notes "$NOTES" \
              --target "$GITHUB_SHA" \
              $PRERELEASE_FLAG
          fi
