name: Build & Push Docker Image
on:
  push:
    branches: [main]
    tags:    ['v*.*.*']
  pull_request:
    branches: [main]
env:
  REGISTRY: ghcr.io
jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Write VERSION file with commit SHA + timestamp
        run: |
          echo "$(date +%Y%m%d-%H%M)-${GITHUB_SHA::7}" > server/src/VERSION
          echo "Version: $(cat server/src/VERSION)"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.server
          push: ${{ github.event_name != 'pull_request' }}
          tags: |
            ghcr.io/phat-shot/craftworks:latest
            ghcr.io/phat-shot/craftworks:${{ github.sha }}
