name: Wear OS APK Build (Gradle)
# Manuell triggern: Actions → "Wear OS APK Build (Gradle)" → Run workflow.
# Baut die AR-Ops-Companion-App für Wear OS (apps/arops-wear/) — ein
# eigenständiges natives Kotlin/Gradle-Projekt, KEIN Expo/RN (dafür gibt es
# keinen Wear-OS-Support). Läuft nie standalone: Companion-App, die den
# Spielstand vom gekoppelten Handy über die Data-Layer-API empfängt.
on:
  workflow_dispatch:
jobs:
  gradle-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.9'

      - name: Debug-APK bauen
        working-directory: apps/arops-wear
        run: gradle :app:assembleDebug --no-daemon

      - uses: actions/upload-artifact@v4
        with:
          name: arops-wear-debug-apk
          path: apps/arops-wear/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
