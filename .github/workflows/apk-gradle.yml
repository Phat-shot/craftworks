name: APK Build (Gradle)
# Manuell triggern: Actions → "APK Build (Gradle)" → Run workflow.
# Baut lokal in der CI per Gradle statt in der EAS-Cloud — kein EAS-
# Build-Kontingent nötig, dafür langsamer (kompletter Android-Build läuft
# hier statt in Expos Cloud-Buildfarm).
#
# assembleRelease, nicht assembleDebug: ein Debug-Build erwartet einen
# laufenden Metro-Dev-Server und fragt beim Start nach dessen URL ("Unable
# to load script", wenn man dort z.B. eine normale Webseiten-URL einträgt —
# das ist kein Metro-Server). Release-Builds bündeln das JS dagegen fest in
# die APK, laufen also eigenständig. Signiert ist das trotzdem nur mit
# Androids Standard-Debug-Keystore (von Expo's prebuild so vorkonfiguriert,
# siehe android/app/build.gradle) — für Sideload/internes Testen
# ausreichend, aber NICHT für einen Play-Store-Release geeignet (dafür
# bräuchte es einen echten Signing-Key + Secrets, siehe apk.yml/EAS dafür).
on:
  workflow_dispatch:
jobs:
  gradle-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Install app deps
        working-directory: apps/arops-mobile
        run: npm install --no-audit --no-fund

      - name: Expo prebuild (generiert das native android/-Projekt)
        working-directory: apps/arops-mobile
        run: npx expo prebuild --platform android --no-install

      - name: Gradle-Wrapper ausführbar machen
        working-directory: apps/arops-mobile/android
        run: chmod +x gradlew

      - uses: gradle/actions/setup-gradle@v4

      - name: Release-APK bauen (JS fest eingebettet, kein Metro nötig)
        working-directory: apps/arops-mobile/android
        run: ./gradlew assembleRelease --no-daemon

      - uses: actions/upload-artifact@v4
        with:
          name: arops-release-apk
          path: apps/arops-mobile/android/app/build/outputs/apk/release/app-release.apk
          if-no-files-found: error
