name: Build & Push Docker Image
# Auf main läuft der Build immer (Merge auf main = Release, keine Ausnahmen).
# Auf test nur, wenn sich seit dem letzten Push tatsächlich etwas an
# server/, client/, packages/ oder dem Dockerfile geändert hat — ein reiner
# App-/Doku-Commit soll kein Image bauen.
on:
  push:
    branches: [main, test]
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm install
      - run: npm run lint
      - run: npm run typecheck
      - run: npm test

  changes:
    runs-on: ubuntu-latest
    outputs:
      run: ${{ steps.check.outputs.run }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - id: check
        run: |
          if [ "$GITHUB_REF_NAME" = "main" ]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          BEFORE="${{ github.event.before }}"
          if [ -z "$BEFORE" ] || [ "$BEFORE" = "0000000000000000000000000000000000000000" ]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if git diff --name-only "$BEFORE" "${{ github.sha }}" | grep -qE '^(client/|server/|packages/|Dockerfile\.server|\.github/workflows/docker\.yml)'; then
            echo "run=true" >> "$GITHUB_OUTPUT"
          else
            echo "run=false" >> "$GITHUB_OUTPUT"
          fi

  build-and-push:
    needs: [test, changes]
    if: needs.changes.outputs.run == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Write VERSION file with commit SHA + timestamp
        run: |
          echo "$(date +%Y%m%d-%H%M)-${GITHUB_SHA::7}" > server/src/VERSION
          echo "Version: $(cat server/src/VERSION)"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Branch → Tag: main = latest, test = test (+ jeweils SHA-Tag)
      - name: Compute image tags
        id: tags
        run: |
          if [ "$GITHUB_REF_NAME" = "main" ]; then
            echo "tags=ghcr.io/phat-shot/craftworks:latest,ghcr.io/phat-shot/craftworks:${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"
          else
            echo "tags=ghcr.io/phat-shot/craftworks:test,ghcr.io/phat-shot/craftworks:test-${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"
          fi

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.server
          push: true
          tags: ${{ steps.tags.outputs.tags }}
